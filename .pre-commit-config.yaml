repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: no-commit-to-branch
  - repo: https://github.com/norwoodj/helm-docs
    rev: v1.14.2
    hooks:
      - id: helm-docs
        args:
          - --chart-search-root=.
  - repo: local
    hooks:
      - id: helm-schema
        name: Generate Helm values.schema.json
        entry: scripts/gen-helm-schema.sh
        language: script
        files: ^charts/.*/(values\.yaml|Chart\.yaml)$
        pass_filenames: true
