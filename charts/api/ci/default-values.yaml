# CI test values for api chart
# Basic configuration to test chart rendering

image:
  repository: nginx
  tag: "1.25"

replicas: 2

ports:
  - name: http
    containerPort: 8080

service:
  enabled: true
  type: ClusterIP

# Ingress disabled by default for internal services
ingress:
  enabled: false

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5

podDisruptionBudget:
  enabled: true
  minAvailable: 1
