# Default values for common library chart
# These defaults are merged with the consuming chart's values via common.values.init
# All keys must be defined here to prevent nil pointer errors in templates

# Global values - passed down from parent charts
global:
  image:
    registry: ""

# Common labels and annotations applied to all resources
commonLabels: {}
commonAnnotations: {}
workloadLabels: {}
workloadAnnotations: {}

# Metadata overrides
nameOverride: ""
fullnameOverride: ""
namespaceOverride: ""

# =============================================================================
# SECURITY CONFIGURATION
# =============================================================================

security:
  # Default pod security context applied to all workloads
  defaultPodSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
    seccompProfile:
      type: RuntimeDefault

  # Default container security context applied to all containers
  defaultContainerSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault

  # Pod Security Standards (PSS) - Kubernetes native
  podSecurityStandards:
    enabled: false
    enforce: ""
    audit: ""
    warn: ""
    labels: {}
    annotations: {}
    namespaceEnforcement: false

  # AppArmor profile
  apparmor:
    enabled: false
    profile: runtime/default

# =============================================================================
# DEPLOYMENT CONFIGURATION
# =============================================================================

deploymentEnabled: true
replicas: 1
revisionHistoryLimit: 2

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 25%  # @schema type:[string, integer]
    maxSurge: 25%  # @schema type:[string, integer]
progressDeadlineSeconds: 600

# Workload type override (deployment, statefulset, daemonset)
workload:
  type: ""

# =============================================================================
# IMAGE CONFIGURATION
# =============================================================================

image:
  registry: ""
  repository: ""
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

# =============================================================================
# CONTAINER CONFIGURATION
# =============================================================================

command: []
args: []

ports: []

# Pod-level resources (Kubernetes 1.32+) - applied at spec.resources
resources: {}

# Container-level overrides
container:
  # Container-level resources - applied at spec.containers[].resources
  # When set, takes precedence over pod-level resources for the main container
  resources: {}

# Container-level security context (overrides security.defaultContainerSecurityContext)
securityContext: {}

# Health checks
livenessProbe: {}
readinessProbe: {}
startupProbe: {}

# Lifecycle hooks
lifecycle: {}

# =============================================================================
# ENVIRONMENT CONFIGURATION
# =============================================================================

env: []
envFrom: []
extraEnvFrom: []
commonEnvVars: true

# =============================================================================
# ADDITIONAL CONTAINERS
# =============================================================================

extraContainers: []
initContainers: []
sidecarContainers: []

# =============================================================================
# POD CONFIGURATION
# =============================================================================

pod:
  labels: {}
  annotations: {}
  securityContext: {}
  hostNetwork: false
  hostPID: false
  hostIPC: false
  hostname: ""
  dnsPolicy: ""
  dnsConfig: {}
  priorityClassName: ""
  priority: ""
  runtimeClassName: ""
  schedulerName: ""
  terminationGracePeriodSeconds: 30
  activeDeadlineSeconds: ""
  restartPolicy: ""
  hostAliases: []

# =============================================================================
# SCHEDULING CONFIGURATION
# =============================================================================

scheduling:
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []

# =============================================================================
# VOLUME CONFIGURATION
# =============================================================================

volumes:
  persistent: {}
  emptyDir: {}
  hostPath: {}
  extra: []
  extraMounts: []

# =============================================================================
# EXTRA DEPLOYMENTS
# =============================================================================

extraDeployments: {}

# =============================================================================
# CRONJOB CONFIGURATION (singular - legacy)
# =============================================================================

# schedule: ""  # When set, renders a single CronJob instead of Deployment
concurrencyPolicy: Forbid
successfulJobsHistoryLimit: 3
failedJobsHistoryLimit: 1
startingDeadlineSeconds: ""
suspend: false
job:
  backoffLimit: 6
  ttlSecondsAfterFinished: 300
  completions: 1
  parallelism: 1
  activeDeadlineSeconds: ""
  completionMode: ""

# =============================================================================
# CRONJOBS (plural - map-based)
# =============================================================================

cronjobs: {}

# =============================================================================
# JOBS
# =============================================================================

jobs: {}

# =============================================================================
# SERVICE CONFIGURATION
# =============================================================================

service:
  enabled: false
  type: ClusterIP
  ports: []
  annotations: {}
  labels: {}
  clusterIP: ""
  loadBalancerIP: ""
  loadBalancerSourceRanges: []
  loadBalancerClass: ""
  allocateLoadBalancerNodePorts: false
  externalTrafficPolicy: ""
  internalTrafficPolicy: ""
  healthCheckNodePort: ""
  externalIPs: []
  externalName: ""
  sessionAffinity: ""
  sessionAffinityConfig: {}
  ipFamilyPolicy: ""
