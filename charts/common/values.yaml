# Default values for common library chart
# These defaults are merged with the consuming chart's values via common.values.init
# All keys must be defined here to prevent nil pointer errors in templates

# Global values - passed down from parent charts
global:
  image:
    registry: ""

# Environment variables as a map (KEY: value), injected into all containers when commonEnvVars is true
# These merge with consuming chart values via Helm deep merge
# Set a value to null to disable it
env:
  TZ: "UTC"
  LOG_FORMAT: "json"

# Common labels and annotations applied to all resources
commonLabels: {}
  # team: backend
  # cost-center: engineering
commonAnnotations: {}
  # company.io/owner: platform-team
workloadLabels: {}
  # app.kubernetes.io/part-of: my-platform
workloadAnnotations: {}
  # cluster-autoscaler.kubernetes.io/safe-to-evict: "true"

# Metadata overrides
nameOverride: ""
fullnameOverride: ""
namespaceOverride: ""

# =============================================================================
# SECURITY CONFIGURATION
# =============================================================================

security:
  # Default pod security context applied to all workloads
  defaultPodSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
    seccompProfile:
      type: RuntimeDefault

  # Default container security context applied to all containers
  # Note: runAsNonRoot and runAsUser are inherited from pod security context
  # via Kubernetes, so they are not duplicated here
  defaultContainerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault

  # Pod Security Standards (PSS) - Kubernetes native
  podSecurityStandards:
    enabled: false
    enforce: ""
    audit: ""
    warn: ""
    labels: {}
    annotations: {}
    namespaceEnforcement: false

  # AppArmor profile
  apparmor:
    enabled: false
    profile: runtime/default

# =============================================================================
# WORKLOAD CONFIGURATION
# =============================================================================

# Workload type: deployment (default), statefulset, daemonset, or none
workload:
  type: deployment

replicas: 1
revisionHistoryLimit: 2

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 25%  # @schema type:[string, integer]
    maxSurge: 25%  # @schema type:[string, integer]
progressDeadlineSeconds: 600

# StatefulSet-specific configuration (when workload.type is "statefulset")
statefulset:
  # serviceName defaults to the release fullname (matching the headless service)
  serviceName: ""
  # podManagementPolicy: OrderedReady (default) or Parallel
  podManagementPolicy: ""
  # updateStrategy for StatefulSet
  updateStrategy:
    type: RollingUpdate
  # ordinals configuration
  ordinals: {}
    # start: 0
  # persistentVolumeClaimRetentionPolicy
  persistentVolumeClaimRetentionPolicy: {}
    # whenDeleted: Retain
    # whenScaled: Retain
  # volumeClaimTemplates - map of PVC templates for per-replica storage
  volumeClaimTemplates: {}
    # data:
    #   mountPath: /var/lib/data
    #   size: 10Gi
    #   accessModes:
    #     - ReadWriteOnce
    #   storageClass: gp3

# DaemonSet-specific configuration (when workload.type is "daemonset")
daemonset:
  # updateStrategy for DaemonSet
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1  # @schema type:[string, integer]

