suite: test deployment
templates:
  - deployment.yaml
tests:
  - it: should create deployment by default
    set:
      configMap.enabled: false
      secret.enabled: false
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: RELEASE-NAME

  - it: should have component main in selector to distinguish from extraDeployments
    set:
      configMap.enabled: false
      secret.enabled: false
    asserts:
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
          value: RELEASE-NAME
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/instance"]
          value: RELEASE-NAME
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/component"]
          value: main
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/component"]
          value: main

  - it: should create deployment when enabled
    set:
      deploymentEnabled: true
      configMap.enabled: false
      secret.enabled: false
    asserts:
      - isKind:
          of: Deployment
      - hasDocuments:
          count: 1

  - it: should not create deployment when disabled
    set:
      deploymentEnabled: false
      configMap.enabled: false
      secret.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should set replicas correctly
    set:
      configMap.enabled: false
      secret.enabled: false
      replicas: 3
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  - it: should use deployment strategy
    set:
      configMap.enabled: false
      secret.enabled: false
      strategy:
        type: RollingUpdate
        rollingUpdate:
          maxUnavailable: 1
          maxSurge: 2
    asserts:
      - equal:
          path: spec.strategy.type
          value: RollingUpdate
      - equal:
          path: spec.strategy.rollingUpdate.maxUnavailable
          value: 1
      - equal:
          path: spec.strategy.rollingUpdate.maxSurge
          value: 2

  - it: should include pod template labels
    set:
      configMap.enabled: false
      secret.enabled: false
    asserts:
      - exists:
          path: spec.template.metadata.labels
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/name"]
          value: RELEASE-NAME
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/instance"]
          value: RELEASE-NAME


  - it: should set pod security context
    set:
      configMap.enabled: false
      secret.enabled: false
      pod:
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          fsGroup: 1000
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsUser
          value: 1000
      - equal:
          path: spec.template.spec.securityContext.runAsGroup
          value: 1000
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 1000

  - it: should add init containers
    set:
      configMap.enabled: false
      secret.enabled: false
      initContainers:
        - name: init-db
          image: busybox:latest
          command: ["sh", "-c", "echo initializing"]
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: init-db
      - equal:
          path: spec.template.spec.initContainers[0].image
          value: busybox:latest

  - it: should create extraDeployment with correct component label
    set:
      configMap.enabled: false
      secret.enabled: false
      extraDeployments:
        worker:
          enabled: true
          replicas: 2
          image:
            repository: myapp
            tag: worker-1.0.0
            pullPolicy: IfNotPresent
    asserts:
      - hasDocuments:
          count: 2
      - equal:
          path: metadata.name
          value: RELEASE-NAME-worker
        documentIndex: 1
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/component"]
          value: worker
        documentIndex: 1

  - it: should process template values in extraDeployment env
    set:
      configMap.enabled: false
      secret.enabled: false
      nameOverride: myapp
      extraDeployments:
        worker:
          enabled: true
          replicas: 1
          image:
            repository: myapp
            tag: worker-1.0.0
            pullPolicy: IfNotPresent
          env:
            - name: RELEASE_NAME
              value: "{{ .Release.Name }}"
            - name: APP_NAME
              value: "{{ .Values.nameOverride }}"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: RELEASE_NAME
            value: RELEASE-NAME
        documentIndex: 1
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: APP_NAME
            value: myapp
        documentIndex: 1

  - it: should handle valueFrom in extraDeployment env
    set:
      configMap.enabled: false
      secret.enabled: false
      extraDeployments:
        worker:
          enabled: true
          replicas: 1
          image:
            repository: myapp
            tag: worker-1.0.0
            pullPolicy: IfNotPresent
          env:
            - name: SECRET_VALUE
              valueFrom:
                secretKeyRef:
                  name: my-secret
                  key: password
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SECRET_VALUE
            valueFrom:
              secretKeyRef:
                name: my-secret
                key: password
        documentIndex: 1

  - it: should handle configMapKeyRef in extraDeployment env
    set:
      configMap.enabled: false
      secret.enabled: false
      extraDeployments:
        worker:
          enabled: true
          replicas: 1
          image:
            repository: myapp
            tag: worker-1.0.0
            pullPolicy: IfNotPresent
          env:
            - name: CONFIG_VALUE
              valueFrom:
                configMapKeyRef:
                  name: my-config
                  key: setting
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CONFIG_VALUE
            valueFrom:
              configMapKeyRef:
                name: my-config
                key: setting
        documentIndex: 1

  - it: should handle fieldRef in extraDeployment env
    set:
      configMap.enabled: false
      secret.enabled: false
      extraDeployments:
        worker:
          enabled: true
          replicas: 1
          image:
            repository: myapp
            tag: worker-1.0.0
            pullPolicy: IfNotPresent
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
        documentIndex: 1

  - it: should not create disabled extraDeployment
    set:
      configMap.enabled: false
      secret.enabled: false
      extraDeployments:
        worker:
          enabled: false
          replicas: 1
          image:
            repository: myapp
            tag: worker-1.0.0
            pullPolicy: IfNotPresent
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.name
          value: RELEASE-NAME

  - it: should create multiple extraDeployments
    set:
      configMap.enabled: false
      secret.enabled: false
      extraDeployments:
        worker:
          enabled: true
          replicas: 2
          image:
            repository: myapp
            tag: worker-1.0.0
            pullPolicy: IfNotPresent
        scheduler:
          enabled: true
          replicas: 1
          image:
            repository: myapp
            tag: scheduler-1.0.0
            pullPolicy: IfNotPresent
    asserts:
      - hasDocuments:
          count: 3
      - equal:
          path: metadata.name
          value: RELEASE-NAME
        documentIndex: 0
      - equal:
          path: metadata.name
          value: RELEASE-NAME-scheduler
        documentIndex: 1
      - equal:
          path: metadata.name
          value: RELEASE-NAME-worker
        documentIndex: 2

  - it: should use fullnameOverride in extraDeployment names
    set:
      configMap.enabled: false
      secret.enabled: false
      fullnameOverride: my-app
      extraDeployments:
        worker:
          enabled: true
          replicas: 1
          image:
            repository: myapp
            tag: worker-1.0.0
            pullPolicy: IfNotPresent
    asserts:
      - hasDocuments:
          count: 2
      - equal:
          path: metadata.name
          value: my-app
        documentIndex: 0
      - equal:
          path: metadata.name
          value: my-app-worker
        documentIndex: 1
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: my-app
        documentIndex: 1

  - it: should set resources in extraDeployment
    set:
      configMap.enabled: false
      secret.enabled: false
      extraDeployments:
        worker:
          enabled: true
          replicas: 1
          image:
            repository: myapp
            tag: worker-1.0.0
            pullPolicy: IfNotPresent
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: 500m
        documentIndex: 1
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 512Mi
        documentIndex: 1

  - it: should set probes in extraDeployment
    set:
      configMap.enabled: false
      secret.enabled: false
      extraDeployments:
        worker:
          enabled: true
          replicas: 1
          image:
            repository: myapp
            tag: worker-1.0.0
            pullPolicy: IfNotPresent
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /healthz
        documentIndex: 1
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /ready
        documentIndex: 1

  - it: should set command and args in extraDeployment
    set:
      configMap.enabled: false
      secret.enabled: false
      extraDeployments:
        worker:
          enabled: true
          replicas: 1
          image:
            repository: myapp
            tag: worker-1.0.0
            pullPolicy: IfNotPresent
          command:
            - /bin/worker
          args:
            - --queue=high
            - --concurrency=5
    asserts:
      - equal:
          path: spec.template.spec.containers[0].command
          value:
            - /bin/worker
        documentIndex: 1
      - equal:
          path: spec.template.spec.containers[0].args
          value:
            - --queue=high
            - --concurrency=5
        documentIndex: 1

  - it: should set pod-level resources when specified
    set:
      configMap.enabled: false
      secret.enabled: false
      pod:
        resources:
          requests:
            cpu: "1"
            memory: "1Gi"
          limits:
            cpu: "2"
            memory: "2Gi"
    asserts:
      - equal:
          path: spec.template.spec.resources.requests.cpu
          value: "1"
      - equal:
          path: spec.template.spec.resources.requests.memory
          value: "1Gi"
      - equal:
          path: spec.template.spec.resources.limits.cpu
          value: "2"
      - equal:
          path: spec.template.spec.resources.limits.memory
          value: "2Gi"

  - it: should not set pod-level resources when not specified
    set:
      configMap.enabled: false
      secret.enabled: false
    asserts:
      - notExists:
          path: spec.template.spec.resources
