suite: test deployment
templates:
  - common.yaml
tests:
  - it: should create deployment by default
    asserts:
      - isKind:
          of: Deployment
        documentSelector:
          path: kind
          value: Deployment
      - equal:
          path: metadata.name
          value: RELEASE-NAME
        documentSelector:
          path: kind
          value: Deployment

  - it: should have component main in selector to distinguish from extraDeployments
    asserts:
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
          value: RELEASE-NAME
        documentSelector:
          path: kind
          value: Deployment
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/instance"]
          value: RELEASE-NAME
        documentSelector:
          path: kind
          value: Deployment
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/component"]
          value: main
        documentSelector:
          path: kind
          value: Deployment
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/component"]
          value: main
        documentSelector:
          path: kind
          value: Deployment

  - it: should create deployment when enabled
    set:
      deploymentEnabled: true
    asserts:
      - isKind:
          of: Deployment
        documentSelector:
          path: kind
          value: Deployment

  - it: should not create deployment when disabled
    set:
      deploymentEnabled: false
      service.enabled: false
      serviceAccount.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should set replicas correctly
    set:
      replicas: 3
    asserts:
      - equal:
          path: spec.replicas
          value: 3
        documentSelector:
          path: kind
          value: Deployment

  - it: should use deployment strategy
    set:
      strategy:
        type: RollingUpdate
        rollingUpdate:
          maxUnavailable: 1
          maxSurge: 2
    asserts:
      - equal:
          path: spec.strategy.type
          value: RollingUpdate
        documentSelector:
          path: kind
          value: Deployment
      - equal:
          path: spec.strategy.rollingUpdate.maxUnavailable
          value: 1
        documentSelector:
          path: kind
          value: Deployment
      - equal:
          path: spec.strategy.rollingUpdate.maxSurge
          value: 2
        documentSelector:
          path: kind
          value: Deployment

  - it: should include pod template labels
    asserts:
      - exists:
          path: spec.template.metadata.labels
        documentSelector:
          path: kind
          value: Deployment
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/name"]
          value: RELEASE-NAME
        documentSelector:
          path: kind
          value: Deployment
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/instance"]
          value: RELEASE-NAME
        documentSelector:
          path: kind
          value: Deployment


  - it: should set pod security context
    set:
      pod:
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          fsGroup: 1000
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsUser
          value: 1000
        documentSelector:
          path: kind
          value: Deployment
      - equal:
          path: spec.template.spec.securityContext.runAsGroup
          value: 1000
        documentSelector:
          path: kind
          value: Deployment
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 1000
        documentSelector:
          path: kind
          value: Deployment

  - it: should add init containers
    set:
      initContainers:
        - name: init-db
          image: busybox:latest
          command: ["sh", "-c", "echo initializing"]
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: init-db
        documentSelector:
          path: kind
          value: Deployment
      - equal:
          path: spec.template.spec.initContainers[0].image
          value: busybox:latest
        documentSelector:
          path: kind
          value: Deployment

  - it: should create extraDeployment with correct component label
    set:
      extraDeployments:
        worker:
          enabled: true
          replicas: 2
          image:
            repository: myapp
            tag: worker-1.0.0
            pullPolicy: IfNotPresent
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-worker
        documentSelector:
          path: metadata.name
          value: RELEASE-NAME-worker
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/component"]
          value: worker
        documentSelector:
          path: metadata.name
          value: RELEASE-NAME-worker

  - it: should process template values in extraDeployment env
    set:
      nameOverride: myapp
      extraDeployments:
        worker:
          enabled: true
          replicas: 1
          image:
            repository: myapp
            tag: worker-1.0.0
            pullPolicy: IfNotPresent
          env:
            - name: RELEASE_NAME
              value: "{{ .Release.Name }}"
            - name: APP_NAME
              value: "{{ .Values.nameOverride }}"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: RELEASE_NAME
            value: RELEASE-NAME
        documentSelector:
          path: metadata.name
          value: RELEASE-NAME-myapp-worker
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: APP_NAME
            value: myapp
        documentSelector:
          path: metadata.name
          value: RELEASE-NAME-myapp-worker

  - it: should handle valueFrom in extraDeployment env
    set:
      extraDeployments:
        worker:
          enabled: true
          replicas: 1
          image:
            repository: myapp
            tag: worker-1.0.0
            pullPolicy: IfNotPresent
          env:
            - name: SECRET_VALUE
              valueFrom:
                secretKeyRef:
                  name: my-secret
                  key: password
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SECRET_VALUE
            valueFrom:
              secretKeyRef:
                name: my-secret
                key: password
        documentSelector:
          path: metadata.name
          value: RELEASE-NAME-worker

  - it: should handle configMapKeyRef in extraDeployment env
    set:
      extraDeployments:
        worker:
          enabled: true
          replicas: 1
          image:
            repository: myapp
            tag: worker-1.0.0
            pullPolicy: IfNotPresent
          env:
            - name: CONFIG_VALUE
              valueFrom:
                configMapKeyRef:
                  name: my-config
                  key: setting
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CONFIG_VALUE
            valueFrom:
              configMapKeyRef:
                name: my-config
                key: setting
        documentSelector:
          path: metadata.name
          value: RELEASE-NAME-worker

  - it: should handle fieldRef in extraDeployment env
    set:
      extraDeployments:
        worker:
          enabled: true
          replicas: 1
          image:
            repository: myapp
            tag: worker-1.0.0
            pullPolicy: IfNotPresent
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
        documentSelector:
          path: metadata.name
          value: RELEASE-NAME-worker

  - it: should not create disabled extraDeployment
    set:
      extraDeployments:
        worker:
          enabled: false
          replicas: 1
          image:
            repository: myapp
            tag: worker-1.0.0
            pullPolicy: IfNotPresent
    asserts:
      - isKind:
          of: Deployment
        documentSelector:
          path: kind
          value: Deployment
      - equal:
          path: metadata.name
          value: RELEASE-NAME
        documentSelector:
          path: kind
          value: Deployment

  - it: should create multiple extraDeployments
    set:
      service.enabled: false
      serviceAccount.enabled: false
      extraDeployments:
        worker:
          enabled: true
          replicas: 2
          image:
            repository: myapp
            tag: worker-1.0.0
            pullPolicy: IfNotPresent
        scheduler:
          enabled: true
          replicas: 1
          image:
            repository: myapp
            tag: scheduler-1.0.0
            pullPolicy: IfNotPresent
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME
        documentSelector:
          path: metadata.name
          value: RELEASE-NAME
      - equal:
          path: metadata.name
          value: RELEASE-NAME-scheduler
        documentSelector:
          path: metadata.name
          value: RELEASE-NAME-scheduler
      - equal:
          path: metadata.name
          value: RELEASE-NAME-worker
        documentSelector:
          path: metadata.name
          value: RELEASE-NAME-worker

  - it: should use fullnameOverride in extraDeployment names
    set:
      service.enabled: false
      serviceAccount.enabled: false
      fullnameOverride: my-app
      extraDeployments:
        worker:
          enabled: true
          replicas: 1
          image:
            repository: myapp
            tag: worker-1.0.0
            pullPolicy: IfNotPresent
    asserts:
      - equal:
          path: metadata.name
          value: my-app
        documentSelector:
          path: metadata.name
          value: my-app
      - equal:
          path: metadata.name
          value: my-app-worker
        documentSelector:
          path: metadata.name
          value: my-app-worker
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: my-app
        documentSelector:
          path: metadata.name
          value: my-app-worker

  - it: should set resources in extraDeployment
    set:
      extraDeployments:
        worker:
          enabled: true
          replicas: 1
          image:
            repository: myapp
            tag: worker-1.0.0
            pullPolicy: IfNotPresent
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: 500m
        documentSelector:
          path: metadata.name
          value: RELEASE-NAME-worker
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 512Mi
        documentSelector:
          path: metadata.name
          value: RELEASE-NAME-worker

  - it: should set probes in extraDeployment
    set:
      extraDeployments:
        worker:
          enabled: true
          replicas: 1
          image:
            repository: myapp
            tag: worker-1.0.0
            pullPolicy: IfNotPresent
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /healthz
        documentSelector:
          path: metadata.name
          value: RELEASE-NAME-worker
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /ready
        documentSelector:
          path: metadata.name
          value: RELEASE-NAME-worker

  - it: should set command and args in extraDeployment
    set:
      extraDeployments:
        worker:
          enabled: true
          replicas: 1
          image:
            repository: myapp
            tag: worker-1.0.0
            pullPolicy: IfNotPresent
          command:
            - /bin/worker
          args:
            - --queue=high
            - --concurrency=5
    asserts:
      - equal:
          path: spec.template.spec.containers[0].command
          value:
            - /bin/worker
        documentSelector:
          path: metadata.name
          value: RELEASE-NAME-worker
      - equal:
          path: spec.template.spec.containers[0].args
          value:
            - --queue=high
            - --concurrency=5
        documentSelector:
          path: metadata.name
          value: RELEASE-NAME-worker

  - it: should set pod-level resources from top-level resources key
    set:
      resources:
        requests:
          cpu: "1"
          memory: "1Gi"
        limits:
          cpu: "2"
          memory: "2Gi"
    asserts:
      - equal:
          path: spec.template.spec.resources.requests.cpu
          value: "1"
        documentSelector:
          path: kind
          value: Deployment
      - equal:
          path: spec.template.spec.resources.requests.memory
          value: "1Gi"
        documentSelector:
          path: kind
          value: Deployment
      - equal:
          path: spec.template.spec.resources.limits.cpu
          value: "2"
        documentSelector:
          path: kind
          value: Deployment
      - equal:
          path: spec.template.spec.resources.limits.memory
          value: "2Gi"
        documentSelector:
          path: kind
          value: Deployment

  - it: should not set pod-level resources when resources is null
    set:
      resources: null
    asserts:
      - notExists:
          path: spec.template.spec.resources
        documentSelector:
          path: kind
          value: Deployment

  - it: should set container-level resources from container.resources
    set:
      resources: null
      container:
        resources:
          requests:
            cpu: "500m"
            memory: "256Mi"
          limits:
            cpu: "1"
            memory: "512Mi"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: "500m"
        documentSelector:
          path: kind
          value: Deployment
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: "512Mi"
        documentSelector:
          path: kind
          value: Deployment
      - notExists:
          path: spec.template.spec.resources
        documentSelector:
          path: kind
          value: Deployment
