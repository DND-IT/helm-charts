suite: test gateway api
templates:
  - common.yaml
tests:
  # ==========================================================================
  # HTTPRoute tests
  # ==========================================================================
  - it: should not render HTTPRoute by default
    set:
      service.enabled: false
      deploymentEnabled: false
      serviceAccount.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should render HTTPRoute when enabled
    capabilities:
      apiVersions:
        - gateway.networking.k8s.io/v1/HTTPRoute
    set:
      gateway.httpRoute.enabled: true
      service.ports:
        - name: http
          port: 80
    asserts:
      - isKind:
          of: HTTPRoute
        documentSelector:
          path: kind
          value: HTTPRoute
      - equal:
          path: apiVersion
          value: gateway.networking.k8s.io/v1
        documentSelector:
          path: kind
          value: HTTPRoute
      - equal:
          path: metadata.name
          value: RELEASE-NAME
        documentSelector:
          path: kind
          value: HTTPRoute

  - it: should not render HTTPRoute when CRD is missing
    set:
      gateway.httpRoute.enabled: true
      service.enabled: false
      deploymentEnabled: false
      serviceAccount.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should render HTTPRoute default rule when no rules specified
    capabilities:
      apiVersions:
        - gateway.networking.k8s.io/v1/HTTPRoute
    set:
      gateway.httpRoute.enabled: true
      service.ports:
        - name: http
          port: 80
    asserts:
      - equal:
          path: spec.rules[0].matches[0].path.type
          value: PathPrefix
        documentSelector:
          path: kind
          value: HTTPRoute
      - equal:
          path: spec.rules[0].matches[0].path.value
          value: /
        documentSelector:
          path: kind
          value: HTTPRoute
      - equal:
          path: spec.rules[0].backendRefs[0].name
          value: RELEASE-NAME
        documentSelector:
          path: kind
          value: HTTPRoute
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 80
        documentSelector:
          path: kind
          value: HTTPRoute

  - it: should configure parent references
    capabilities:
      apiVersions:
        - gateway.networking.k8s.io/v1/HTTPRoute
    set:
      gateway.httpRoute.enabled: true
      gateway.httpRoute.parentRefs:
        - name: custom-gateway
          namespace: gateway-system
          sectionName: https
          port: 443
      service.ports:
        - name: http
          port: 80
    asserts:
      - equal:
          path: spec.parentRefs[0].name
          value: custom-gateway
        documentSelector:
          path: kind
          value: HTTPRoute
      - equal:
          path: spec.parentRefs[0].namespace
          value: gateway-system
        documentSelector:
          path: kind
          value: HTTPRoute
      - equal:
          path: spec.parentRefs[0].sectionName
          value: https
        documentSelector:
          path: kind
          value: HTTPRoute
      - equal:
          path: spec.parentRefs[0].port
          value: 443
        documentSelector:
          path: kind
          value: HTTPRoute

  - it: should configure parentRef with group and kind
    capabilities:
      apiVersions:
        - gateway.networking.k8s.io/v1/HTTPRoute
    set:
      gateway.httpRoute.enabled: true
      gateway.httpRoute.parentRefs:
        - name: my-gateway
          group: gateway.networking.k8s.io
          kind: Gateway
          namespace: infra
      service.ports:
        - name: http
          port: 80
    asserts:
      - equal:
          path: spec.parentRefs[0].group
          value: gateway.networking.k8s.io
        documentSelector:
          path: kind
          value: HTTPRoute
      - equal:
          path: spec.parentRefs[0].kind
          value: Gateway
        documentSelector:
          path: kind
          value: HTTPRoute

  - it: should configure hostnames and rules
    capabilities:
      apiVersions:
        - gateway.networking.k8s.io/v1/HTTPRoute
    set:
      gateway.httpRoute.enabled: true
      gateway.httpRoute.hostnames:
        - "example.com"
        - "*.example.com"
      gateway.httpRoute.rules:
        - matches:
            - path:
                type: PathPrefix
                value: /api
              method: GET
          filters:
            - type: RequestHeaderModifier
              requestHeaderModifier:
                set:
                  - name: x-forwarded-proto
                    value: https
          backendRefs:
            - name: api-service
              port: 8080
              weight: 100
      service.ports:
        - name: http
          port: 80
    asserts:
      - equal:
          path: spec.hostnames
          value: ["example.com", "*.example.com"]
        documentSelector:
          path: kind
          value: HTTPRoute
      - equal:
          path: spec.rules[0].matches[0].path.type
          value: PathPrefix
        documentSelector:
          path: kind
          value: HTTPRoute
      - equal:
          path: spec.rules[0].matches[0].path.value
          value: /api
        documentSelector:
          path: kind
          value: HTTPRoute
      - equal:
          path: spec.rules[0].matches[0].method
          value: GET
        documentSelector:
          path: kind
          value: HTTPRoute
      - equal:
          path: spec.rules[0].filters[0].type
          value: RequestHeaderModifier
        documentSelector:
          path: kind
          value: HTTPRoute
      - equal:
          path: spec.rules[0].filters[0].requestHeaderModifier.set[0].name
          value: x-forwarded-proto
        documentSelector:
          path: kind
          value: HTTPRoute
      - equal:
          path: spec.rules[0].backendRefs[0].name
          value: api-service
        documentSelector:
          path: kind
          value: HTTPRoute
      - equal:
          path: spec.rules[0].backendRefs[0].weight
          value: 100
        documentSelector:
          path: kind
          value: HTTPRoute

  - it: should configure header matching
    capabilities:
      apiVersions:
        - gateway.networking.k8s.io/v1/HTTPRoute
    set:
      gateway.httpRoute.enabled: true
      gateway.httpRoute.rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
              headers:
                - type: Exact
                  name: x-env
                  value: canary
          backendRefs:
            - name: canary-svc
              port: 80
      service.ports:
        - name: http
          port: 80
    asserts:
      - equal:
          path: spec.rules[0].matches[0].headers[0].type
          value: Exact
        documentSelector:
          path: kind
          value: HTTPRoute
      - equal:
          path: spec.rules[0].matches[0].headers[0].name
          value: x-env
        documentSelector:
          path: kind
          value: HTTPRoute
      - equal:
          path: spec.rules[0].matches[0].headers[0].value
          value: canary
        documentSelector:
          path: kind
          value: HTTPRoute

  - it: should configure query param matching
    capabilities:
      apiVersions:
        - gateway.networking.k8s.io/v1/HTTPRoute
    set:
      gateway.httpRoute.enabled: true
      gateway.httpRoute.rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
              queryParams:
                - type: Exact
                  name: version
                  value: "2"
          backendRefs:
            - name: v2-svc
              port: 80
      service.ports:
        - name: http
          port: 80
    asserts:
      - equal:
          path: spec.rules[0].matches[0].queryParams[0].type
          value: Exact
        documentSelector:
          path: kind
          value: HTTPRoute
      - equal:
          path: spec.rules[0].matches[0].queryParams[0].name
          value: version
        documentSelector:
          path: kind
          value: HTTPRoute

  - it: should configure ResponseHeaderModifier filter
    capabilities:
      apiVersions:
        - gateway.networking.k8s.io/v1/HTTPRoute
    set:
      gateway.httpRoute.enabled: true
      gateway.httpRoute.rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          filters:
            - type: ResponseHeaderModifier
              responseHeaderModifier:
                set:
                  - name: x-frame-options
                    value: DENY
                add:
                  - name: x-request-id
                    value: abc123
                remove:
                  - x-powered-by
          backendRefs:
            - name: my-svc
              port: 80
      service.ports:
        - name: http
          port: 80
    asserts:
      - equal:
          path: spec.rules[0].filters[0].type
          value: ResponseHeaderModifier
        documentSelector:
          path: kind
          value: HTTPRoute
      - equal:
          path: spec.rules[0].filters[0].responseHeaderModifier.set[0].name
          value: x-frame-options
        documentSelector:
          path: kind
          value: HTTPRoute
      - equal:
          path: spec.rules[0].filters[0].responseHeaderModifier.add[0].name
          value: x-request-id
        documentSelector:
          path: kind
          value: HTTPRoute
      - equal:
          path: spec.rules[0].filters[0].responseHeaderModifier.remove[0]
          value: x-powered-by
        documentSelector:
          path: kind
          value: HTTPRoute

  - it: should configure RequestRedirect filter
    capabilities:
      apiVersions:
        - gateway.networking.k8s.io/v1/HTTPRoute
    set:
      gateway.httpRoute.enabled: true
      gateway.httpRoute.rules:
        - matches:
            - path:
                type: PathPrefix
                value: /old
          filters:
            - type: RequestRedirect
              requestRedirect:
                scheme: https
                hostname: new.example.com
                port: 443
                statusCode: 301
                path:
                  type: ReplaceFullPath
                  replaceFullPath: /new
          backendRefs:
            - name: my-svc
              port: 80
      service.ports:
        - name: http
          port: 80
    asserts:
      - equal:
          path: spec.rules[0].filters[0].type
          value: RequestRedirect
        documentSelector:
          path: kind
          value: HTTPRoute
      - equal:
          path: spec.rules[0].filters[0].requestRedirect.scheme
          value: https
        documentSelector:
          path: kind
          value: HTTPRoute
      - equal:
          path: spec.rules[0].filters[0].requestRedirect.hostname
          value: new.example.com
        documentSelector:
          path: kind
          value: HTTPRoute
      - equal:
          path: spec.rules[0].filters[0].requestRedirect.port
          value: 443
        documentSelector:
          path: kind
          value: HTTPRoute
      - equal:
          path: spec.rules[0].filters[0].requestRedirect.statusCode
          value: 301
        documentSelector:
          path: kind
          value: HTTPRoute
      - equal:
          path: spec.rules[0].filters[0].requestRedirect.path.type
          value: ReplaceFullPath
        documentSelector:
          path: kind
          value: HTTPRoute
      - equal:
          path: spec.rules[0].filters[0].requestRedirect.path.replaceFullPath
          value: /new
        documentSelector:
          path: kind
          value: HTTPRoute

  - it: should configure URLRewrite filter
    capabilities:
      apiVersions:
        - gateway.networking.k8s.io/v1/HTTPRoute
    set:
      gateway.httpRoute.enabled: true
      gateway.httpRoute.rules:
        - matches:
            - path:
                type: PathPrefix
                value: /api/v1
          filters:
            - type: URLRewrite
              urlRewrite:
                hostname: backend.internal
                path:
                  type: ReplacePrefixMatch
                  replacePrefixMatch: /v1
          backendRefs:
            - name: my-svc
              port: 80
      service.ports:
        - name: http
          port: 80
    asserts:
      - equal:
          path: spec.rules[0].filters[0].type
          value: URLRewrite
        documentSelector:
          path: kind
          value: HTTPRoute
      - equal:
          path: spec.rules[0].filters[0].urlRewrite.hostname
          value: backend.internal
        documentSelector:
          path: kind
          value: HTTPRoute
      - equal:
          path: spec.rules[0].filters[0].urlRewrite.path.type
          value: ReplacePrefixMatch
        documentSelector:
          path: kind
          value: HTTPRoute
      - equal:
          path: spec.rules[0].filters[0].urlRewrite.path.replacePrefixMatch
          value: /v1
        documentSelector:
          path: kind
          value: HTTPRoute

  - it: should configure RequestMirror filter
    capabilities:
      apiVersions:
        - gateway.networking.k8s.io/v1/HTTPRoute
    set:
      gateway.httpRoute.enabled: true
      gateway.httpRoute.rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          filters:
            - type: RequestMirror
              requestMirror:
                backendRef:
                  name: mirror-svc
                  port: 8080
                  namespace: mirror-ns
          backendRefs:
            - name: my-svc
              port: 80
      service.ports:
        - name: http
          port: 80
    asserts:
      - equal:
          path: spec.rules[0].filters[0].type
          value: RequestMirror
        documentSelector:
          path: kind
          value: HTTPRoute
      - equal:
          path: spec.rules[0].filters[0].requestMirror.backendRef.name
          value: mirror-svc
        documentSelector:
          path: kind
          value: HTTPRoute
      - equal:
          path: spec.rules[0].filters[0].requestMirror.backendRef.port
          value: 8080
        documentSelector:
          path: kind
          value: HTTPRoute
      - equal:
          path: spec.rules[0].filters[0].requestMirror.backendRef.namespace
          value: mirror-ns
        documentSelector:
          path: kind
          value: HTTPRoute

  - it: should configure ExtensionRef filter
    capabilities:
      apiVersions:
        - gateway.networking.k8s.io/v1/HTTPRoute
    set:
      gateway.httpRoute.enabled: true
      gateway.httpRoute.rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          filters:
            - type: ExtensionRef
              extensionRef:
                group: custom.example.com
                kind: RateLimitPolicy
                name: my-rate-limit
          backendRefs:
            - name: my-svc
              port: 80
      service.ports:
        - name: http
          port: 80
    asserts:
      - equal:
          path: spec.rules[0].filters[0].type
          value: ExtensionRef
        documentSelector:
          path: kind
          value: HTTPRoute
      - equal:
          path: spec.rules[0].filters[0].extensionRef.group
          value: custom.example.com
        documentSelector:
          path: kind
          value: HTTPRoute
      - equal:
          path: spec.rules[0].filters[0].extensionRef.kind
          value: RateLimitPolicy
        documentSelector:
          path: kind
          value: HTTPRoute
      - equal:
          path: spec.rules[0].filters[0].extensionRef.name
          value: my-rate-limit
        documentSelector:
          path: kind
          value: HTTPRoute

  - it: should configure backendRef with kind namespace and weight
    capabilities:
      apiVersions:
        - gateway.networking.k8s.io/v1/HTTPRoute
    set:
      gateway.httpRoute.enabled: true
      gateway.httpRoute.rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          backendRefs:
            - name: external-svc
              kind: Service
              namespace: other-ns
              port: 443
              weight: 50
      service.ports:
        - name: http
          port: 80
    asserts:
      - equal:
          path: spec.rules[0].backendRefs[0].kind
          value: Service
        documentSelector:
          path: kind
          value: HTTPRoute
      - equal:
          path: spec.rules[0].backendRefs[0].namespace
          value: other-ns
        documentSelector:
          path: kind
          value: HTTPRoute
      - equal:
          path: spec.rules[0].backendRefs[0].name
          value: external-svc
        documentSelector:
          path: kind
          value: HTTPRoute
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 443
        documentSelector:
          path: kind
          value: HTTPRoute
      - equal:
          path: spec.rules[0].backendRefs[0].weight
          value: 50
        documentSelector:
          path: kind
          value: HTTPRoute

  - it: should configure HTTPRoute labels and annotations
    capabilities:
      apiVersions:
        - gateway.networking.k8s.io/v1/HTTPRoute
    set:
      gateway.httpRoute.enabled: true
      gateway.httpRoute.labels:
        custom-label: my-value
      gateway.httpRoute.annotations:
        custom-annotation: my-annotation
      service.ports:
        - name: http
          port: 80
    asserts:
      - equal:
          path: metadata.labels.custom-label
          value: my-value
        documentSelector:
          path: kind
          value: HTTPRoute
      - equal:
          path: metadata.annotations.custom-annotation
          value: my-annotation
        documentSelector:
          path: kind
          value: HTTPRoute

  - it: should create extra HTTPRoutes
    capabilities:
      apiVersions:
        - gateway.networking.k8s.io/v1/HTTPRoute
    set:
      service.enabled: false
      deploymentEnabled: false
      serviceAccount.enabled: false
      gateway.httpRoute.enabled: true
      gateway.httpRoute.extraRoutes:
        api:
          enabled: true
          hostnames:
            - api.example.com
          rules:
            - matches:
                - path:
                    type: PathPrefix
                    value: /v1
              backendRefs:
                - name: api-v1-service
                  port: 8080
      service.ports:
        - name: http
          port: 80
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME
        documentSelector:
          path: metadata.name
          value: RELEASE-NAME
      - equal:
          path: metadata.name
          value: RELEASE-NAME-api
        documentSelector:
          path: metadata.name
          value: RELEASE-NAME-api
      - equal:
          path: spec.hostnames[0]
          value: api.example.com
        documentSelector:
          path: metadata.name
          value: RELEASE-NAME-api

  # ==========================================================================
  # GRPCRoute tests
  # ==========================================================================
  - it: should not render GRPCRoute by default
    set:
      service.enabled: false
      deploymentEnabled: false
      serviceAccount.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should render GRPCRoute when enabled
    capabilities:
      apiVersions:
        - gateway.networking.k8s.io/v1/GRPCRoute
    set:
      gateway.grpcRoute.enabled: true
      service.ports:
        - name: grpc
          port: 50051
    asserts:
      - isKind:
          of: GRPCRoute
        documentSelector:
          path: kind
          value: GRPCRoute
      - equal:
          path: apiVersion
          value: gateway.networking.k8s.io/v1
        documentSelector:
          path: kind
          value: GRPCRoute
      - equal:
          path: metadata.name
          value: RELEASE-NAME
        documentSelector:
          path: kind
          value: GRPCRoute

  - it: should not render GRPCRoute when CRD is missing
    set:
      gateway.grpcRoute.enabled: true
      service.enabled: false
      deploymentEnabled: false
      serviceAccount.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should render GRPCRoute default rule when no rules specified
    capabilities:
      apiVersions:
        - gateway.networking.k8s.io/v1/GRPCRoute
    set:
      gateway.grpcRoute.enabled: true
      service.ports:
        - name: grpc
          port: 50051
    asserts:
      - equal:
          path: spec.rules[0].backendRefs[0].name
          value: RELEASE-NAME
        documentSelector:
          path: kind
          value: GRPCRoute
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 50051
        documentSelector:
          path: kind
          value: GRPCRoute

  - it: should configure GRPCRoute parentRefs
    capabilities:
      apiVersions:
        - gateway.networking.k8s.io/v1/GRPCRoute
    set:
      gateway.grpcRoute.enabled: true
      gateway.grpcRoute.parentRefs:
        - name: grpc-gateway
          namespace: gateway-system
          sectionName: grpc
          port: 50051
      service.ports:
        - name: grpc
          port: 50051
    asserts:
      - equal:
          path: spec.parentRefs[0].name
          value: grpc-gateway
        documentSelector:
          path: kind
          value: GRPCRoute
      - equal:
          path: spec.parentRefs[0].namespace
          value: gateway-system
        documentSelector:
          path: kind
          value: GRPCRoute
      - equal:
          path: spec.parentRefs[0].sectionName
          value: grpc
        documentSelector:
          path: kind
          value: GRPCRoute
      - equal:
          path: spec.parentRefs[0].port
          value: 50051
        documentSelector:
          path: kind
          value: GRPCRoute

  - it: should configure GRPCRoute with method matching
    capabilities:
      apiVersions:
        - gateway.networking.k8s.io/v1/GRPCRoute
    set:
      gateway.grpcRoute.enabled: true
      gateway.grpcRoute.hostnames:
        - grpc.example.com
      gateway.grpcRoute.rules:
        - matches:
            - method:
                type: Exact
                service: myservice.v1.MyService
                method: GetItem
              headers:
                - type: Exact
                  name: x-tenant
                  value: acme
          backendRefs:
            - name: grpc-svc
              port: 50051
      service.ports:
        - name: grpc
          port: 50051
    asserts:
      - equal:
          path: spec.hostnames[0]
          value: grpc.example.com
        documentSelector:
          path: kind
          value: GRPCRoute
      - equal:
          path: spec.rules[0].matches[0].method.type
          value: Exact
        documentSelector:
          path: kind
          value: GRPCRoute
      - equal:
          path: spec.rules[0].matches[0].method.service
          value: myservice.v1.MyService
        documentSelector:
          path: kind
          value: GRPCRoute
      - equal:
          path: spec.rules[0].matches[0].method.method
          value: GetItem
        documentSelector:
          path: kind
          value: GRPCRoute
      - equal:
          path: spec.rules[0].matches[0].headers[0].name
          value: x-tenant
        documentSelector:
          path: kind
          value: GRPCRoute

  - it: should configure GRPCRoute filters
    capabilities:
      apiVersions:
        - gateway.networking.k8s.io/v1/GRPCRoute
    set:
      gateway.grpcRoute.enabled: true
      gateway.grpcRoute.rules:
        - filters:
            - type: RequestHeaderModifier
              requestHeaderModifier:
                set:
                  - name: x-grpc-env
                    value: staging
                add:
                  - name: x-trace
                    value: enabled
                remove:
                  - x-debug
          backendRefs:
            - name: grpc-svc
              port: 50051
      service.ports:
        - name: grpc
          port: 50051
    asserts:
      - equal:
          path: spec.rules[0].filters[0].type
          value: RequestHeaderModifier
        documentSelector:
          path: kind
          value: GRPCRoute
      - equal:
          path: spec.rules[0].filters[0].requestHeaderModifier.set[0].name
          value: x-grpc-env
        documentSelector:
          path: kind
          value: GRPCRoute
      - equal:
          path: spec.rules[0].filters[0].requestHeaderModifier.add[0].name
          value: x-trace
        documentSelector:
          path: kind
          value: GRPCRoute
      - equal:
          path: spec.rules[0].filters[0].requestHeaderModifier.remove[0]
          value: x-debug
        documentSelector:
          path: kind
          value: GRPCRoute

  - it: should configure GRPCRoute backendRef with all fields
    capabilities:
      apiVersions:
        - gateway.networking.k8s.io/v1/GRPCRoute
    set:
      gateway.grpcRoute.enabled: true
      gateway.grpcRoute.rules:
        - backendRefs:
            - name: grpc-svc
              group: ""
              kind: Service
              namespace: backend-ns
              port: 50051
              weight: 80
      service.ports:
        - name: grpc
          port: 50051
    asserts:
      - equal:
          path: spec.rules[0].backendRefs[0].name
          value: grpc-svc
        documentSelector:
          path: kind
          value: GRPCRoute
      - equal:
          path: spec.rules[0].backendRefs[0].namespace
          value: backend-ns
        documentSelector:
          path: kind
          value: GRPCRoute
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 50051
        documentSelector:
          path: kind
          value: GRPCRoute
      - equal:
          path: spec.rules[0].backendRefs[0].weight
          value: 80
        documentSelector:
          path: kind
          value: GRPCRoute

  - it: should configure GRPCRoute labels and annotations
    capabilities:
      apiVersions:
        - gateway.networking.k8s.io/v1/GRPCRoute
    set:
