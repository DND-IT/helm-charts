suite: test gateway api
templates:
  - common.yaml
tests:
  # HTTPRoute tests
  - it: should not render HTTPRoute by default
    set:
      service.enabled: false
      deploymentEnabled: false
      serviceAccount.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should render HTTPRoute when enabled
    capabilities:
      apiVersions:
        - gateway.networking.k8s.io/v1/HTTPRoute
    set:
      gateway.httpRoute.enabled: true
      service.ports:
        - name: http
          port: 80
    asserts:
      - isKind:
          of: HTTPRoute
        documentSelector:
          path: kind
          value: HTTPRoute
      - equal:
          path: metadata.name
          value: RELEASE-NAME
        documentSelector:
          path: kind
          value: HTTPRoute

  - it: should configure parent references
    capabilities:
      apiVersions:
        - gateway.networking.k8s.io/v1/HTTPRoute
    set:
      gateway.httpRoute.enabled: true
      gateway.httpRoute.parentRefs:
        - name: custom-gateway
          namespace: gateway-system
          sectionName: https
          port: 443
      service.ports:
        - name: http
          port: 80
    asserts:
      - equal:
          path: spec.parentRefs[0].name
          value: custom-gateway
        documentSelector:
          path: kind
          value: HTTPRoute
      - equal:
          path: spec.parentRefs[0].namespace
          value: gateway-system
        documentSelector:
          path: kind
          value: HTTPRoute
      - equal:
          path: spec.parentRefs[0].sectionName
          value: https
        documentSelector:
          path: kind
          value: HTTPRoute
      - equal:
          path: spec.parentRefs[0].port
          value: 443
        documentSelector:
          path: kind
          value: HTTPRoute

  - it: should configure hostnames and rules
    capabilities:
      apiVersions:
        - gateway.networking.k8s.io/v1/HTTPRoute
    set:
      gateway.httpRoute.enabled: true
      gateway.httpRoute.hostnames:
        - "example.com"
        - "*.example.com"
      gateway.httpRoute.rules:
        - matches:
            - path:
                type: PathPrefix
                value: /api
              method: GET
          filters:
            - type: RequestHeaderModifier
              requestHeaderModifier:
                set:
                  - name: x-forwarded-proto
                    value: https
          backendRefs:
            - name: api-service
              port: 8080
              weight: 100
      service.ports:
        - name: http
          port: 80
    asserts:
      - equal:
          path: spec.hostnames
          value: ["example.com", "*.example.com"]
        documentSelector:
          path: kind
          value: HTTPRoute
      - equal:
          path: spec.rules[0].matches[0].path.type
          value: PathPrefix
        documentSelector:
          path: kind
          value: HTTPRoute
      - equal:
          path: spec.rules[0].matches[0].path.value
          value: /api
        documentSelector:
          path: kind
          value: HTTPRoute
      - equal:
          path: spec.rules[0].matches[0].method
          value: GET
        documentSelector:
          path: kind
          value: HTTPRoute
      - equal:
          path: spec.rules[0].filters[0].type
          value: RequestHeaderModifier
        documentSelector:
          path: kind
          value: HTTPRoute
      - equal:
          path: spec.rules[0].backendRefs[0].name
          value: api-service
        documentSelector:
          path: kind
          value: HTTPRoute
      - equal:
          path: spec.rules[0].backendRefs[0].weight
          value: 100
        documentSelector:
          path: kind
          value: HTTPRoute

  - it: should create extra HTTPRoutes
    capabilities:
      apiVersions:
        - gateway.networking.k8s.io/v1/HTTPRoute
    set:
      service.enabled: false
      deploymentEnabled: false
      serviceAccount.enabled: false
      gateway.httpRoute.enabled: true
      gateway.httpRoute.extraRoutes:
        api:
          enabled: true
          hostnames:
            - api.example.com
          rules:
            - matches:
                - path:
                    type: PathPrefix
                    value: /v1
              backendRefs:
                - name: api-v1-service
                  port: 8080
      service.ports:
        - name: http
          port: 80
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME
        documentSelector:
          path: metadata.name
          value: RELEASE-NAME
      - equal:
          path: metadata.name
          value: RELEASE-NAME-api
        documentSelector:
          path: metadata.name
          value: RELEASE-NAME-api
      - equal:
          path: spec.hostnames[0]
          value: api.example.com
        documentSelector:
          path: metadata.name
          value: RELEASE-NAME-api

  # TCPRoute tests
  - it: should not render TCPRoute by default
    set:
      service.enabled: false
      deploymentEnabled: false
      serviceAccount.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should render TCPRoute when enabled
    capabilities:
      apiVersions:
        - gateway.networking.k8s.io/v1alpha2/TCPRoute
    set:
      gateway.tcpRoute.enabled: true
      service.ports:
        - name: tcp
          port: 9000
    asserts:
      - isKind:
          of: TCPRoute
        documentSelector:
          path: kind
          value: TCPRoute
      - equal:
          path: metadata.name
          value: RELEASE-NAME-tcp
        documentSelector:
          path: kind
          value: TCPRoute

  - it: should configure default TCP backend
    capabilities:
      apiVersions:
        - gateway.networking.k8s.io/v1alpha2/TCPRoute
    set:
      gateway.tcpRoute.enabled: true
      service.ports:
        - name: tcp
          port: 9000
    asserts:
      - equal:
          path: spec.rules[0].backendRefs[0].name
          value: RELEASE-NAME
        documentSelector:
          path: kind
          value: TCPRoute
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 9000
        documentSelector:
          path: kind
          value: TCPRoute

  - it: should configure custom TCP rules
    capabilities:
      apiVersions:
        - gateway.networking.k8s.io/v1alpha2/TCPRoute
    set:
      gateway.tcpRoute.enabled: true
      gateway.tcpRoute.rules:
        - backendRefs:
            - name: tcp-service
              port: 9000
              weight: 90
            - name: tcp-backup
              port: 9000
              weight: 10
      service.ports:
        - name: tcp
          port: 9000
    asserts:
      - equal:
          path: spec.rules[0].backendRefs[0].name
          value: tcp-service
        documentSelector:
          path: kind
          value: TCPRoute
      - equal:
          path: spec.rules[0].backendRefs[0].weight
          value: 90
        documentSelector:
          path: kind
          value: TCPRoute
      - equal:
          path: spec.rules[0].backendRefs[1].name
          value: tcp-backup
        documentSelector:
          path: kind
          value: TCPRoute

  - it: should create extra TCPRoutes
    capabilities:
      apiVersions:
        - gateway.networking.k8s.io/v1alpha2/TCPRoute
    set:
      gateway.tcpRoute.enabled: true
      gateway.tcpRoute.extraRoutes:
        database:
          enabled: true
          rules:
            - backendRefs:
                - name: postgres-primary
                  port: 5432
                  weight: 70
      service.ports:
        - name: tcp
          port: 9000
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-database-tcp
        documentSelector:
          path: metadata.name
          value: RELEASE-NAME-database-tcp
      - equal:
          path: spec.rules[0].backendRefs[0].name
          value: postgres-primary
        documentSelector:
          path: metadata.name
          value: RELEASE-NAME-database-tcp

  # ReferenceGrant tests
  - it: should not render ReferenceGrant by default
    set:
      service.enabled: false
      deploymentEnabled: false
      serviceAccount.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should render ReferenceGrant when enabled
    capabilities:
      apiVersions:
        - gateway.networking.k8s.io/v1beta1/ReferenceGrant
    set:
      gateway.referenceGrant.enabled: true
      gateway.referenceGrant.from:
        - group: gateway.networking.k8s.io
          kind: Gateway
          namespace: gateway-system
      gateway.referenceGrant.to:
        - group: ""
          kind: Service
          name: backend-service
    asserts:
      - isKind:
          of: ReferenceGrant
        documentSelector:
          path: kind
          value: ReferenceGrant
      - equal:
          path: spec.from[0].group
          value: gateway.networking.k8s.io
        documentSelector:
          path: kind
          value: ReferenceGrant
      - equal:
          path: spec.from[0].kind
          value: Gateway
        documentSelector:
          path: kind
          value: ReferenceGrant
      - equal:
          path: spec.from[0].namespace
          value: gateway-system
        documentSelector:
          path: kind
          value: ReferenceGrant
      - equal:
          path: spec.to[0].group
          value: ""
        documentSelector:
          path: kind
          value: ReferenceGrant
      - equal:
          path: spec.to[0].kind
          value: Service
        documentSelector:
          path: kind
          value: ReferenceGrant

  - it: should create extra ReferenceGrants
    capabilities:
      apiVersions:
        - gateway.networking.k8s.io/v1beta1/ReferenceGrant
    set:
      service.enabled: false
      deploymentEnabled: false
      serviceAccount.enabled: false
      gateway.referenceGrant.enabled: true
      gateway.referenceGrant.from:
        - group: gateway.networking.k8s.io
          kind: HTTPRoute
      gateway.referenceGrant.to:
        - group: ""
          kind: Service
      gateway.referenceGrant.extraGrants:
        secrets:
          enabled: true
          from:
            - group: gateway.networking.k8s.io
              kind: Gateway
              namespace: gateway-system
          to:
            - group: ""
              kind: Secret
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME
        documentSelector:
          path: metadata.name
          value: RELEASE-NAME
      - equal:
          path: metadata.name
          value: RELEASE-NAME-secrets
        documentSelector:
          path: metadata.name
          value: RELEASE-NAME-secrets
