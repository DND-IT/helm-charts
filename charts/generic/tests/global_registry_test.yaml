suite: test global.registry
templates:
  - deployment.yaml
tests:
  # =============================================
  # Main deployment image
  # =============================================
  - it: should prepend global.registry to main deployment image
    set:
      global:
        registry: my-private-registry.io
      image:
        repository: nginx
        tag: "1.25"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: my-private-registry.io/nginx:1.25

  - it: image.registry should override global.registry
    set:
      global:
        registry: my-private-registry.io
      image:
        registry: ecr.us-east-1.amazonaws.com
        repository: nginx
        tag: "1.25"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ecr.us-east-1.amazonaws.com/nginx:1.25

  - it: should not modify image when global.registry is empty
    set:
      global:
        registry: ""
      image:
        repository: nginx
        tag: "1.25"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: nginx:1.25

  - it: should strip existing registry from repository when global.registry is set
    set:
      global:
        registry: my-private-registry.io
      image:
        repository: docker.io/library/nginx
        tag: "1.25"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: my-private-registry.io/library/nginx:1.25

  # =============================================
  # Init containers (string images)
  # =============================================
  - it: should prepend global.registry to init container string image
    set:
      global:
        registry: my-private-registry.io
      initContainers:
        - name: setup
          image: "busybox:1.35"
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].image
          value: my-private-registry.io/busybox:1.35

  - it: should not modify init container image that already has a registry
    set:
      global:
        registry: my-private-registry.io
      initContainers:
        - name: setup
          image: "docker.io/library/busybox:1.35"
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].image
          value: docker.io/library/busybox:1.35

  - it: should prepend global.registry to init container with path-like image
    set:
      global:
        registry: my-private-registry.io
      initContainers:
        - name: migrate
          image: "migrate/migrate:latest"
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].image
          value: my-private-registry.io/migrate/migrate:latest

  # =============================================
  # Init containers (structured images)
  # =============================================
  - it: should prepend global.registry to init container structured image
    set:
      global:
        registry: my-private-registry.io
      initContainers:
        - name: setup
          image:
            repository: busybox
            tag: "1.35"
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].image
          value: my-private-registry.io/busybox:1.35

  - it: per-container registry should override global.registry on structured image
    set:
      global:
        registry: my-private-registry.io
      initContainers:
        - name: setup
          image:
            registry: quay.io
            repository: busybox
            tag: "1.35"
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].image
          value: quay.io/busybox:1.35

  # =============================================
  # Sidecar containers
  # =============================================
  - it: should prepend global.registry to sidecar container string image
    set:
      global:
        registry: my-private-registry.io
      sidecarContainers:
        - name: metrics
          image: "prom/node-exporter:latest"
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].image
          value: my-private-registry.io/prom/node-exporter:latest

  - it: should prepend global.registry to sidecar container structured image
    set:
      global:
        registry: my-private-registry.io
      sidecarContainers:
        - name: metrics
          image:
            repository: prom/node-exporter
            tag: latest
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].image
          value: my-private-registry.io/prom/node-exporter:latest

  # =============================================
  # Precedence chain
  # =============================================
  - it: image.registry should override global.registry for init containers
    set:
      global:
        registry: my-private-registry.io
      image:
        registry: ecr.us-east-1.amazonaws.com
        repository: nginx
        tag: "1.25"
      initContainers:
        - name: setup
          image: "busybox:1.35"
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].image
          value: ecr.us-east-1.amazonaws.com/busybox:1.35

  - it: image.registry should override global.registry for structured init containers
    set:
      global:
        registry: my-private-registry.io
      image:
        registry: ecr.us-east-1.amazonaws.com
        repository: nginx
        tag: "1.25"
      initContainers:
        - name: setup
          image:
            repository: busybox
            tag: "1.35"
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].image
          value: ecr.us-east-1.amazonaws.com/busybox:1.35

---
suite: test global.registry on extra deployments
templates:
  - deployment.yaml
tests:
  - it: should prepend global.registry to extra deployment image
    set:
      global:
        registry: my-private-registry.io
      image:
        repository: nginx
        tag: "1.25"
      extraDeployments:
        worker:
          enabled: true
          image:
            repository: worker-app
            tag: "2.0"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: my-private-registry.io/worker-app:2.0
        documentIndex: 1

  - it: per-deployment registry should override global.registry
    set:
      global:
        registry: my-private-registry.io
      image:
        repository: nginx
        tag: "1.25"
      extraDeployments:
        worker:
          enabled: true
          image:
            registry: quay.io
            repository: worker-app
            tag: "2.0"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: quay.io/worker-app:2.0
        documentIndex: 1

