            tag: "v4"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/migrate/migrate:v4

---
suite: test global.registry on cronjobs
templates:
  - cronjob.yaml
tests:
  - it: should prepend global.registry to cronjob image
    set:
      global:
        registry: my-private-registry.io
      image:
        repository: nginx
        tag: "1.25"
      cronjobs:
        cleanup:
          enabled: true
          schedule: "0 * * * *"
          image:
            repository: cleanup-tool
            tag: "1.0"
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].image
          value: my-private-registry.io/cleanup-tool:1.0

  - it: per-cronjob registry should override global.registry
    set:
      global:
        registry: my-private-registry.io
      image:
        repository: nginx
        tag: "1.25"
      cronjobs:
        cleanup:
          enabled: true
          schedule: "0 * * * *"
          image:
            registry: gcr.io
            repository: cleanup-tool
            tag: "1.0"
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].image
          value: gcr.io/cleanup-tool:1.0

---
suite: test global.registry on hooks
templates:
  - lifecycle/hooks.yaml
tests:
  - it: should prepend global.registry to pre-install hook image
    set:
      global:
        registry: my-private-registry.io
      hooks:
        enabled: true
        preInstall:
          - name: migrate
            image: "migrate/migrate:latest"
            command: ["migrate"]
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: my-private-registry.io/migrate/migrate:latest

  - it: should not modify hook image that already has a registry
    set:
      global:
        registry: my-private-registry.io
      hooks:
        enabled: true
        preInstall:
          - name: migrate
            image: "ghcr.io/migrate/migrate:latest"
            command: ["migrate"]
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/migrate/migrate:latest

  - it: should prepend global.registry to post-upgrade hook image
    set:
      global:
        registry: my-private-registry.io
      hooks:
        enabled: true
        postUpgrade:
          - name: notify
            image: "curlimages/curl:latest"
            command: ["curl"]
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: my-private-registry.io/curlimages/curl:latest

  - it: image.registry should override global.registry for hooks
    set:
      global:
        registry: my-private-registry.io
      image:
        registry: ecr.us-east-1.amazonaws.com
        repository: nginx
        tag: "1.25"
      hooks:
        enabled: true
        preInstall:
          - name: migrate
            image: "migrate/migrate:latest"
            command: ["migrate"]
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ecr.us-east-1.amazonaws.com/migrate/migrate:latest

  - it: should prepend global.registry to simple image name in hook
    set:
      global:
        registry: my-private-registry.io
      hooks:
        enabled: true
        preInstall:
          - name: setup
            image: "busybox:1.35"
            command: ["sh"]
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: my-private-registry.io/busybox:1.35
