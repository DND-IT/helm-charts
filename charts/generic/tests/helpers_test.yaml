suite: test helpers
templates:
  - deployment.yaml  # Use deployment as it uses most helpers
tests:
  - it: should generate correct fullname
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME

  - it: should use nameOverride
    set:
      nameOverride: custom-name
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-custom-name

  - it: should use fullnameOverride
    set:
      fullnameOverride: my-app
    asserts:
      - equal:
          path: metadata.name
          value: my-app

  - it: should use fullnameOverride in labels
    set:
      fullnameOverride: my-app
    asserts:
      - equal:
          path: metadata.name
          value: my-app
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: my-app
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
          value: my-app
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/name"]
          value: my-app

  - it: fullnameOverride should take precedence over nameOverride
    set:
      nameOverride: should-be-ignored
      fullnameOverride: my-app
    asserts:
      - equal:
          path: metadata.name
          value: my-app
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: my-app

  - it: should use nameOverride in labels when fullnameOverride is not set
    set:
      nameOverride: custom-name
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-custom-name
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: custom-name
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
          value: custom-name

  - it: should truncate long fullnameOverride to 63 characters
    set:
      fullnameOverride: this-is-a-very-long-name-that-exceeds-the-sixty-three-character-limit-for-kubernetes
    asserts:
      - equal:
          path: metadata.name
          value: this-is-a-very-long-name-that-exceeds-the-sixty-three-character
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: this-is-a-very-long-name-that-exceeds-the-sixty-three-character

  - it: should generate correct labels
    asserts:
      - matchRegex:
          path: metadata.labels["helm.sh/chart"]
          pattern: ^generic-\d+\.\d+\.\d+$
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: RELEASE-NAME
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: RELEASE-NAME
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm

  - it: should include common labels
    set:
      commonLabels:
        environment: production
        team: platform
    asserts:
      - equal:
          path: metadata.labels.environment
          value: production
      - equal:
          path: metadata.labels.team
          value: platform

  - it: should use custom namespace
    set:
      namespaceOverride: custom-namespace
    asserts:
      - equal:
          path: metadata.namespace
          value: custom-namespace

  - it: should generate service account name
    set:
      serviceAccount.enabled: true
      serviceAccount.name: ""
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: RELEASE-NAME

  - it: should use custom service account name
    set:
      serviceAccount.enabled: true
      serviceAccount.name: custom-sa
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: custom-sa

  - it: should validate required image repository
    set:
      image.repository: ""
    asserts:
      - failedTemplate: {}

  - it: should handle template values in env
    set:
      nameOverride: myapp
      env:
        - name: APP_NAME
          value: "{{ .Values.nameOverride }}"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: APP_NAME
            value: myapp

  - it: should evaluate templates in commonLabels
    set:
      image:
        repository: "myapp"
        tag: "v1.2.3"
      generic:
        environment: "production"
      commonLabels:
        app.environment: "{{ .Values.generic.environment }}"
        combined: "{{ .Release.Name }}-{{ .Values.image.tag }}"
    asserts:
      - equal:
          path: metadata.labels["app.environment"]
          value: production
      - equal:
          path: metadata.labels["combined"]
          value: RELEASE-NAME-v1.2.3

  - it: should evaluate templates in commonAnnotations
    set:
      image:
        repository: "myapp"
        tag: "v1.2.3"
      commonAnnotations:
        app.version: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        release: "{{ .Release.Name }}"
    asserts:
      - equal:
          path: metadata.annotations["app.version"]
          value: myapp:v1.2.3
      - equal:
          path: metadata.annotations["release"]
          value: RELEASE-NAME
