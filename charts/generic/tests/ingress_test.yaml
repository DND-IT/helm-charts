suite: test ingress
templates:
  - common.yaml
tests:
  - it: should not create ingress by default
    set:
      service.enabled: false
      deploymentEnabled: false
      serviceAccount.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should create ingress when enabled
    set:
      ingress.enabled: true
    asserts:
      - isKind:
          of: Ingress
        documentSelector:
          path: kind
          value: Ingress
      - equal:
          path: metadata.name
          value: RELEASE-NAME
        documentSelector:
          path: kind
          value: Ingress

  - it: should set ingress class name
    set:
      ingress.enabled: true
      ingress.ingressClassName: nginx
    capabilities:
      apiVersions:
        - networking.k8s.io/v1
    asserts:
      - equal:
          path: spec.ingressClassName
          value: nginx
        documentSelector:
          path: kind
          value: Ingress

  - it: should create rules with default host
    set:
      ingress.enabled: true
      ingress.hosts:
        - host: chart-example.local
          paths:
            - path: /
              pathType: ImplementationSpecific
    asserts:
      - equal:
          path: spec.rules[0].host
          value: chart-example.local
        documentSelector:
          path: kind
          value: Ingress
      - equal:
          path: spec.rules[0].http.paths[0].path
          value: /
        documentSelector:
          path: kind
          value: Ingress
      - equal:
          path: spec.rules[0].http.paths[0].pathType
          value: ImplementationSpecific
        documentSelector:
          path: kind
          value: Ingress

  - it: should create multiple hosts
    set:
      ingress.enabled: true
      ingress.hosts:
        - host: app1.example.com
          paths:
            - path: /
              pathType: Prefix
        - host: app2.example.com
          paths:
            - path: /api
              pathType: Exact
    asserts:
      - equal:
          path: spec.rules[0].host
          value: app1.example.com
        documentSelector:
          path: kind
          value: Ingress
      - equal:
          path: spec.rules[1].host
          value: app2.example.com
        documentSelector:
          path: kind
          value: Ingress
      - equal:
          path: spec.rules[1].http.paths[0].path
          value: /api
        documentSelector:
          path: kind
          value: Ingress


  - it: should add annotations
    set:
      ingress.enabled: true
      ingress.annotations:
        alb.ingress.kubernetes.io/scheme: internet-facing
        alb.ingress.kubernetes.io/target-type: ip
    asserts:
      - equal:
          path: metadata.annotations
          value:
            alb.ingress.kubernetes.io/scheme: internet-facing
            alb.ingress.kubernetes.io/target-type: ip
        documentSelector:
          path: kind
          value: Ingress

  - it: should use v1 API version for Kubernetes 1.29+
    set:
      ingress.enabled: true
    asserts:
      - equal:
          path: apiVersion
          value: networking.k8s.io/v1
        documentSelector:
          path: kind
          value: Ingress
