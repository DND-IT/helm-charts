suite: test port value
templates:
  - common.yaml
tests:
  # ===========================================================================
  # port value flows to container, service, and targetGroupConfiguration
  # ===========================================================================

  - it: should set container port from port value
    set:
      port: 3001
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 3001
        documentSelector:
          path: kind
          value: Deployment
      - equal:
          path: spec.template.spec.containers[0].ports[0].name
          value: http
        documentSelector:
          path: kind
          value: Deployment

  - it: should set service port and targetPort from port value
    set:
      port: 3001
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 3001
        documentSelector:
          path: kind
          value: Service
      - equal:
          path: spec.ports[0].targetPort
          value: 3001
        documentSelector:
          path: kind
          value: Service
      - equal:
          path: spec.ports[0].name
          value: http
        documentSelector:
          path: kind
          value: Service

  - it: should allow overriding service port while keeping targetPort from port
    set:
      port: 3001
      service:
        port: 80
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 80
        documentSelector:
          path: kind
          value: Service
      - equal:
          path: spec.ports[0].targetPort
          value: 3001
        documentSelector:
          path: kind
          value: Service

  - it: should prefer ports array over port value
    set:
      port: 3001
      ports:
        - name: grpc
          containerPort: 9090
          protocol: TCP
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 9090
        documentSelector:
          path: kind
          value: Deployment
      - equal:
          path: spec.template.spec.containers[0].ports[0].name
          value: grpc
        documentSelector:
          path: kind
          value: Deployment

  - it: should not render container ports when port is null and service disabled
    set:
      service:
        enabled: false
      serviceAccount:
        enabled: false
    asserts:
      - isNull:
          path: spec.template.spec.containers[0].ports
        documentSelector:
          path: kind
          value: Deployment
