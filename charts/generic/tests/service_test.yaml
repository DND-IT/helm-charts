suite: test service
templates:
  - common.yaml
tests:
  - it: should create service by default
    asserts:
      - isKind:
          of: Service
        documentSelector:
          path: kind
          value: Service
      - equal:
          path: metadata.name
          value: RELEASE-NAME
        documentSelector:
          path: kind
          value: Service

  - it: should have component main in selector to distinguish from extraDeployments
    asserts:
      - equal:
          path: spec.selector["app.kubernetes.io/name"]
          value: RELEASE-NAME
        documentSelector:
          path: kind
          value: Service
      - equal:
          path: spec.selector["app.kubernetes.io/instance"]
          value: RELEASE-NAME
        documentSelector:
          path: kind
          value: Service
      - equal:
          path: spec.selector["app.kubernetes.io/component"]
          value: main
        documentSelector:
          path: kind
          value: Service

  - it: should use fullnameOverride in service name and selector
    set:
      fullnameOverride: my-custom-app
    asserts:
      - equal:
          path: metadata.name
          value: my-custom-app
        documentSelector:
          path: kind
          value: Service
      - equal:
          path: spec.selector["app.kubernetes.io/name"]
          value: my-custom-app
        documentSelector:
          path: kind
          value: Service

  - it: should not create service when disabled
    set:
      service.enabled: false
      serviceAccount.enabled: false
      workload.type: none
    asserts:
      - hasDocuments:
          count: 0

  - it: should set service type
    set:
      service.type: LoadBalancer
    asserts:
      - equal:
          path: spec.type
          value: LoadBalancer
        documentSelector:
          path: kind
          value: Service

  - it: should set service ports
    set:
      service.ports:
        - name: http
          port: 8080
          targetPort: 80
          protocol: TCP
        - name: https
          port: 8443
          targetPort: 443
          protocol: TCP
    asserts:
      - lengthEqual:
          path: spec.ports
          count: 2
        documentSelector:
          path: kind
          value: Service
      - equal:
          path: spec.ports[0].name
          value: http
        documentSelector:
          path: kind
          value: Service
      - equal:
          path: spec.ports[0].port
          value: 8080
        documentSelector:
          path: kind
          value: Service
      - equal:
          path: spec.ports[1].name
          value: https
        documentSelector:
          path: kind
          value: Service
      - equal:
          path: spec.ports[1].port
          value: 8443
        documentSelector:
          path: kind
          value: Service

  - it: should set cluster IP
    set:
      service.clusterIP: "10.0.0.10"
    asserts:
      - equal:
          path: spec.clusterIP
          value: "10.0.0.10"
        documentSelector:
          path: kind
          value: Service

  - it: should set session affinity
    set:
      service.sessionAffinity: ClientIP
      service.sessionAffinityConfig:
        clientIP:
          timeoutSeconds: 3600
    asserts:
      - equal:
          path: spec.sessionAffinity
          value: ClientIP
        documentSelector:
          path: kind
          value: Service
      - equal:
          path: spec.sessionAffinityConfig.clientIP.timeoutSeconds
          value: 3600
        documentSelector:
          path: kind
          value: Service

  - it: should add service annotations
    set:
      service.annotations:
        service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
        service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
    asserts:
      - equal:
          path: metadata.annotations["service.beta.kubernetes.io/aws-load-balancer-type"]
          value: "nlb"
        documentSelector:
          path: kind
          value: Service

  - it: should default to top-level ports configuration
    set:
      ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
      service:
        enabled: true
        ports: []
    asserts:
      - lengthEqual:
          path: spec.ports
          count: 2
        documentSelector:
          path: kind
          value: Service
      - equal:
          path: spec.ports[0].name
          value: http
        documentSelector:
          path: kind
          value: Service
      - equal:
          path: spec.ports[0].port
          value: 8000
        documentSelector:
          path: kind
          value: Service
      - equal:
          path: spec.ports[0].targetPort
          value: 8000
        documentSelector:
          path: kind
          value: Service
      - equal:
          path: spec.ports[1].name
          value: metrics
        documentSelector:
          path: kind
          value: Service
      - equal:
          path: spec.ports[1].port
          value: 9090
        documentSelector:
          path: kind
          value: Service
      - equal:
          path: spec.ports[1].targetPort
          value: 9090
        documentSelector:
          path: kind
          value: Service

  - it: should allow service.ports to override top-level ports
    set:
      ports:
        - name: http
          containerPort: 8000
          protocol: TCP
      service:
        enabled: true
        ports:
          - name: http
            port: 80
            targetPort: 8000
            protocol: TCP
    asserts:
      - lengthEqual:
          path: spec.ports
          count: 1
        documentSelector:
          path: kind
          value: Service
      - equal:
          path: spec.ports[0].port
          value: 80
        documentSelector:
          path: kind
          value: Service
      - equal:
          path: spec.ports[0].targetPort
          value: 8000
        documentSelector:
          path: kind
          value: Service

  - it: should support port field in top-level ports for custom service port
    set:
      ports:
        - name: http
          containerPort: 8080
          port: 80
          protocol: TCP
      service:
        enabled: true
        ports: []
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 80
        documentSelector:
          path: kind
          value: Service
      - equal:
          path: spec.ports[0].targetPort
          value: 8080
        documentSelector:
          path: kind
          value: Service

  - it: extraServices should use component selector when matching extraDeployment exists
    set:
      service.enabled: false
      workload.type: none
      serviceAccount.enabled: false
      extraDeployments:
        worker:
          image:
            repository: nginx
            tag: latest
      extraServices:
        worker:
          enabled: true
          ports:
            - name: http
              port: 8080
    asserts:
      - isKind:
          of: Service
        documentSelector:
          path: kind
          value: Service
      - equal:
          path: metadata.name
          value: RELEASE-NAME-worker
        documentSelector:
          path: kind
          value: Service
      - equal:
          path: spec.selector["app.kubernetes.io/name"]
          value: RELEASE-NAME
        documentSelector:
          path: kind
          value: Service
      - equal:
          path: spec.selector["app.kubernetes.io/instance"]
          value: RELEASE-NAME
        documentSelector:
          path: kind
          value: Service
      - equal:
          path: spec.selector["app.kubernetes.io/component"]
          value: worker
        documentSelector:
          path: kind
          value: Service

  - it: extraServices should use base selector without component when no matching extraDeployment
    set:
      service.enabled: false
      workload.type: none
      serviceAccount.enabled: false
      extraServices:
        external-api:
          enabled: true
          ports:
            - name: http
              port: 8080
    asserts:
      - isKind:
          of: Service
        documentSelector:
          path: kind
          value: Service
      - equal:
          path: metadata.name
          value: RELEASE-NAME-external-api
        documentSelector:
          path: kind
          value: Service
      - equal:
          path: spec.selector["app.kubernetes.io/name"]
          value: RELEASE-NAME
        documentSelector:
          path: kind
          value: Service
      - equal:
          path: spec.selector["app.kubernetes.io/instance"]
          value: RELEASE-NAME
        documentSelector:
          path: kind
          value: Service
      # No component label when extraService doesn't match an extraDeployment
      - isNull:
          path: spec.selector["app.kubernetes.io/component"]
        documentSelector:
          path: kind
          value: Service

  - it: extraServices should allow custom selector override
    set:
      service.enabled: false
      workload.type: none
      serviceAccount.enabled: false
      extraDeployments:
        worker:
          image:
            repository: nginx
            tag: latest
      extraServices:
        worker:
          enabled: true
          ports:
            - name: http
              port: 8080
          selector:
            custom-label: custom-value
    asserts:
      - isKind:
          of: Service
        documentSelector:
          path: kind
          value: Service
      - equal:
          path: spec.selector["custom-label"]
          value: custom-value
        documentSelector:
          path: kind
          value: Service
      - isNull:
          path: spec.selector["app.kubernetes.io/component"]
        documentSelector:
          path: kind
          value: Service

  - it: extraServices should use fullnameOverride in name and selector
    set:
      service.enabled: false
      workload.type: none
      serviceAccount.enabled: false
      fullnameOverride: my-app
      extraDeployments:
        worker:
          image:
            repository: nginx
            tag: latest
      extraServices:
        worker:
          enabled: true
          ports:
            - name: http
              port: 8080
    asserts:
      - equal:
          path: metadata.name
          value: my-app-worker
        documentSelector:
          path: kind
          value: Service
      - equal:
          path: spec.selector["app.kubernetes.io/name"]
          value: my-app
        documentSelector:
          path: kind
          value: Service
      - equal:
          path: spec.selector["app.kubernetes.io/component"]
          value: worker
        documentSelector:
          path: kind
          value: Service

  - it: should include common labels with fullnameOverride
    set:
      fullnameOverride: my-app
      commonLabels:
        environment: production
    asserts:
      - equal:
          path: metadata.name
          value: my-app
        documentSelector:
          path: kind
          value: Service
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: my-app
        documentSelector:
          path: kind
          value: Service
      - equal:
          path: metadata.labels.environment
          value: production
        documentSelector:
          path: kind
          value: Service

  - it: should support template in commonLabels with fullnameOverride
    set:
      fullnameOverride: my-app
      image:
        repository: nginx
        tag: "2.0.0"
      commonLabels:
        app.version: "{{ .Values.image.tag }}"
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: my-app
        documentSelector:
          path: kind
          value: Service
      - equal:
          path: metadata.labels["app.version"]
          value: "2.0.0"
        documentSelector:
          path: kind
          value: Service
