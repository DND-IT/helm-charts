suite: test deployment basics
templates:
  - common.yaml
tests:
  - it: should create deployment by default
    asserts:
      - isKind:
          of: Deployment
        documentSelector:
          path: kind
          value: Deployment
      - equal:
          path: metadata.name
          value: RELEASE-NAME
        documentSelector:
          path: kind
          value: Deployment

  - it: should not create deployment when disabled
    set:
      deploymentEnabled: false
      service.enabled: false
      serviceAccount.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should set replicas
    set:
      replicas: 5
    asserts:
      - equal:
          path: spec.replicas
          value: 5
        documentSelector:
          path: kind
          value: Deployment

  - it: should add labels
    set:
      pod:
        labels:
          custom: label
          environment: test
    asserts:
      - equal:
          path: spec.template.metadata.labels.custom
          value: label
        documentSelector:
          path: kind
          value: Deployment
      - equal:
          path: spec.template.metadata.labels.environment
          value: test
        documentSelector:
          path: kind
          value: Deployment
