# Default values for generic chart
# This is a YAML-formatted file with secure defaults
# All values not specified here inherit from the common library chart

# ============================================================================
# GLOBAL CONFIGURATION
# ============================================================================

global:
  image:
    # Container registry prepended to all images that don't specify one
    registry: ""

# Common labels and annotations applied to all resources
# Supports Helm template syntax for dynamic values
commonLabels: {}
commonAnnotations: {}

generic:
  # Values for templating - use these in other template expressions
  branchName: ""     # e.g., "feature-123", "main", "develop"
  environment: ""    # e.g., "dev", "staging", "production"

# Metadata overrides
nameOverride: ""
fullnameOverride: ""
namespaceOverride: ""

# ============================================================================
# IMAGE CONFIGURATION
# ============================================================================

image:
  registry: ""
  repository: registry.k8s.io/pause
  tag: "3.10"
  pullPolicy: IfNotPresent

imagePullSecrets: []

# ============================================================================
# DEPLOYMENT CONFIGURATION
# ============================================================================

deploymentEnabled: true
replicas: 1
revisionHistoryLimit: 2
progressDeadlineSeconds: 600

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 25%  # @schema type:[string, integer]
    maxSurge: 25%  # @schema type:[string, integer]

# ============================================================================
# CONTAINER CONFIGURATION
# ============================================================================

command: []
args: []

# Container ports
ports: []
# - name: http
#   containerPort: 8000
#   protocol: TCP
#   port: 80  # Optional: Use port 80 for service, 8000 for container

# Resources
resources:
  limits:
    memory: "256Mi"
  requests:
    cpu: "100m"
    memory: "128Mi"

# Container-level security context
securityContext: {}

# Health checks
livenessProbe: {}
readinessProbe: {}
startupProbe: {}
lifecycle: {}

# ============================================================================
# ENVIRONMENT CONFIGURATION
# ============================================================================

env: []
envFrom: []
extraEnvFrom: []
commonEnvVars: true

# ============================================================================
# ADDITIONAL CONTAINERS
# ============================================================================

extraContainers: []
initContainers: []
sidecarContainers: []

# ============================================================================
# POD CONFIGURATION
# ============================================================================

pod:
  labels: {}
  annotations: {}
  securityContext: {}
  resources: {}
  hostNetwork: false
  hostPID: false
  hostIPC: false
  hostname: ""
  dnsPolicy: ""
  dnsConfig: {}
  priorityClassName: ""
  priority: ""
  runtimeClassName: ""
  schedulerName: ""
  terminationGracePeriodSeconds: 30
  activeDeadlineSeconds: ""
  restartPolicy: ""
  hostAliases: []

# ============================================================================
# SCHEDULING CONFIGURATION
# ============================================================================

scheduling:
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway

# ============================================================================
# VOLUME CONFIGURATION
# ============================================================================

volumes:
  persistent: {}
  emptyDir: {}
  hostPath: {}
  extra: []
  extraMounts: []

# ============================================================================
# EXTRA DEPLOYMENTS
# ============================================================================

extraDeployments: {}

# ============================================================================
# CRONJOBS (map-based)
# ============================================================================

cronjobs: {}

# ============================================================================
# JOBS
# ============================================================================

jobs: {}

# ============================================================================
# SERVICE CONFIGURATION
# ============================================================================

service:
  enabled: true
  type: ClusterIP
  ports: []
  annotations: {}
  labels: {}
  clusterIP: ""
  loadBalancerIP: ""
  loadBalancerSourceRanges: []
  loadBalancerClass: ""
  allocateLoadBalancerNodePorts: false
  externalTrafficPolicy: ""
  internalTrafficPolicy: ""
  healthCheckNodePort: ""
  externalIPs: []
  externalName: ""
  sessionAffinity: ""
  sessionAffinityConfig: {}
  ipFamilyPolicy: ""
  ipFamilies: []
  publishNotReadyAddresses: false

extraServices: {}

# ============================================================================
# INGRESS CONFIGURATION
# ============================================================================

ingress:
  enabled: false
  ingressClassName: "alb"
  labels: {}
  annotations: {}
  defaultBackend: {}
  hosts: []

extraIngresses: {}

# ============================================================================
# SERVICE ACCOUNT
# ============================================================================

serviceAccount:
  enabled: true
  name: ""
  annotations: {}
  labels: {}
  automountServiceAccountToken: true

# ============================================================================
# RBAC
# ============================================================================

rbac:
  enabled: false
  type: Role
  rules: []
  aggregationRule: {}
  labels: {}
  annotations: {}
  roleRef: ""
  subjects: []
  extraRoles: {}

# ============================================================================
# CONFIG AND SECRETS
# ============================================================================

configMap:
  enabled: false
  data: {}
  binaryData: {}
  annotations: {}
  labels: {}
  envFrom: false
  mountPath: ""
  subPath: ""

secret:
  enabled: false
  type: Opaque
  data: {}
  stringData: {}
  annotations: {}
  labels: {}
  envFrom: false
  mountPath: ""
  subPath: ""

extraConfigMaps: {}
extraSecrets: {}
externalSecrets: {}

# ============================================================================
# AUTOSCALING
# ============================================================================

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior: {}

vpa:
  enabled: false
  updateMode: Auto
  labels: {}
  annotations: {}
  updatePolicy: {}
  containerPolicies: []
  resourcePolicy: {}
  recommenders: []

# ============================================================================
# POD DISRUPTION BUDGET
# ============================================================================

podDisruptionBudget:
  enabled: false
  minAvailable: 1
  unhealthyPodEvictionPolicy: ""

# ============================================================================
# NETWORK POLICY
# ============================================================================

networkPolicy:
  enabled: false
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress: []

# ============================================================================
# GATEWAY API
# ============================================================================

gateway:
  httpRoute:
    enabled: false
    labels: {}
    annotations: {}
    parentRefs: []
    hostnames: []
    rules: []
    extraRoutes: {}

  tcpRoute:
    enabled: false
    labels: {}
    annotations: {}
    parentRefs: []
    rules: []
    extraRoutes: {}

  referenceGrant:
    enabled: false
    labels: {}
    annotations: {}
    from: []
    to: []
    extraGrants: {}

  grpcRoute:
    enabled: false
    labels: {}
    annotations: {}
    parentRefs: []
    hostnames: []
    rules: []
    extraRoutes: {}

  tlsRoute:
    enabled: false
    labels: {}
    annotations: {}
    parentRefs: []
    hostnames: []
    rules: []
    extraRoutes: {}

  udpRoute:
    enabled: false
    labels: {}
    annotations: {}
    parentRefs: []
    rules: []
    extraRoutes: {}

  targetGroupConfiguration:
    enabled: false
    labels: {}
    annotations: {}
    targetReference: {}
    defaultConfiguration: {}
    routeConfigurations: []

  loadBalancerConfiguration:
    enabled: false
    labels: {}
    annotations: {}
    loadBalancerName: ""
    scheme: ""
    ipAddressType: ""
    loadBalancerSubnets: []
    securityGroups: []
    sourceRanges: []
    listenerConfigurations: []
    loadBalancerAttributes: []
    tags: {}
    wafV2: {}
    shieldConfiguration: {}

  listenerRuleConfiguration:
    enabled: false
    labels: {}
    annotations: {}
    targetRef: {}
    conditions: []
    actions: []
    tags: {}

# ============================================================================
# HELM HOOKS
# ============================================================================

hooks:
  enabled: false
  preInstall: []
  postInstall: []
  preUpgrade: []
  postUpgrade: []
  preDelete: []
  postDelete: []

# ============================================================================
# AWS TARGET GROUP BINDING
# ============================================================================

targetGroupBinding:
  enabled: false
  labels: {}
  annotations: {}
  targetGroupARN: ""
  serviceRef:
    name: ""
    port: "http"  # @schema type:[string, integer]
  targetType: ""
  ipAddressType: ""
  networking: {}

extraTargetGroupBindings: {}

# ============================================================================
# EXTRA OBJECTS
# ============================================================================

extraObjects: []
