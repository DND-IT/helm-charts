# CI test values for task chart
# Basic configuration to test chart rendering

image:
  repository: busybox
  tag: "1.36"

schedule: "*/5 * * * *"
concurrencyPolicy: Forbid
successfulJobsHistoryLimit: 3
failedJobsHistoryLimit: 1

job:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300

command:
  - /bin/sh
  - -c
args:
  - "echo 'Running scheduled task'; date"

resources:
  limits:
    memory: "128Mi"
  requests:
    cpu: "50m"
    memory: "64Mi"
