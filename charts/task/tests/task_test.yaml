suite: test task chart defaults
templates:
  - common.yaml
tests:
  # ===========================================================================
  # CronJob rendering
  # ===========================================================================

  - it: should create a CronJob (not a Deployment)
    set:
      image.repository: mytask
      image.tag: latest
      cronjobs:
        default:
          enabled: true
          schedule: "0 * * * *"
    asserts:
      - isKind:
          of: CronJob
        documentSelector:
          path: kind
          value: CronJob
      - not: true
        isKind:
          of: Deployment

  - it: should set the schedule from the entry
    set:
      image.repository: mytask
      image.tag: latest
      cronjobs:
        default:
          enabled: true
          schedule: "0 * * * *"
    asserts:
      - equal:
          path: spec.schedule
          value: "0 * * * *"
        documentSelector:
          path: kind
          value: CronJob

  - it: should allow setting concurrencyPolicy per entry
    set:
      image.repository: mytask
      image.tag: latest
      cronjobs:
        default:
          enabled: true
          schedule: "0 * * * *"
          concurrencyPolicy: Forbid
    asserts:
      - equal:
          path: spec.concurrencyPolicy
          value: Forbid
        documentSelector:
          path: kind
          value: CronJob

  - it: should allow setting successfulJobsHistoryLimit per entry
    set:
      image.repository: mytask
      image.tag: latest
      cronjobs:
        default:
          enabled: true
          schedule: "0 * * * *"
          successfulJobsHistoryLimit: 3
    asserts:
      - equal:
          path: spec.successfulJobsHistoryLimit
          value: 3
        documentSelector:
          path: kind
          value: CronJob

  - it: should allow setting failedJobsHistoryLimit per entry
    set:
      image.repository: mytask
      image.tag: latest
      cronjobs:
        default:
          enabled: true
          schedule: "0 * * * *"
          failedJobsHistoryLimit: 1
    asserts:
      - equal:
          path: spec.failedJobsHistoryLimit
          value: 1
        documentSelector:
          path: kind
          value: CronJob

  - it: should allow setting suspend per entry
    set:
      image.repository: mytask
      image.tag: latest
      cronjobs:
        default:
          enabled: true
          schedule: "0 * * * *"
          suspend: true
    asserts:
      - equal:
          path: spec.suspend
          value: true
        documentSelector:
          path: kind
          value: CronJob

  # ===========================================================================
  # Job spec - backoffLimit / ttl read directly from the entry (no nested job:)
  # ===========================================================================

  - it: should read backoffLimit directly from the entry
    set:
      image.repository: mytask
      image.tag: latest
      cronjobs:
        default:
          enabled: true
          schedule: "0 * * * *"
          backoffLimit: 6
    asserts:
      - equal:
          path: spec.jobTemplate.spec.backoffLimit
          value: 6
        documentSelector:
          path: kind
          value: CronJob

  - it: should read ttlSecondsAfterFinished directly from the entry
    set:
      image.repository: mytask
      image.tag: latest
      cronjobs:
        default:
          enabled: true
          schedule: "0 * * * *"
          ttlSecondsAfterFinished: 300
    asserts:
      - equal:
          path: spec.jobTemplate.spec.ttlSecondsAfterFinished
          value: 300
        documentSelector:
          path: kind
          value: CronJob

  - it: should default to OnFailure restartPolicy
    set:
      image.repository: mytask
      image.tag: latest
      cronjobs:
        default:
          enabled: true
          schedule: "0 * * * *"
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.restartPolicy
          value: OnFailure
        documentSelector:
          path: kind
          value: CronJob

  # ===========================================================================
  # Container defaults
  # ===========================================================================

  - it: should have default pod-level resource requests
    set:
      image.repository: mytask
      image.tag: latest
      cronjobs:
        default:
          enabled: true
          schedule: "0 * * * *"
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].resources.requests.cpu
          value: 100m
        documentSelector:
          path: kind
          value: CronJob
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].resources.requests.memory
          value: 128Mi
        documentSelector:
          path: kind
          value: CronJob

  - it: should set the container image from root image
    set:
      image.repository: my-custom-task
      image.tag: v2.0.0
      cronjobs:
        default:
          enabled: true
          schedule: "0 * * * *"
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].image
          value: "my-custom-task:v2.0.0"
        documentSelector:
          path: kind
          value: CronJob

  - it: should override root image with per-entry image
    set:
      image.repository: my-custom-task
      image.tag: v2.0.0
      cronjobs:
        default:
          enabled: true
          schedule: "0 * * * *"
          image:
            repository: cleanup
            tag: v3.0.0
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].image
          value: "cleanup:v3.0.0"
        documentSelector:
          path: kind
          value: CronJob

  # ===========================================================================
  # No Deployment or Service
  # ===========================================================================

  - it: should not create a Deployment
    set:
      image.repository: mytask
      image.tag: latest
      cronjobs:
        default:
          enabled: true
          schedule: "0 * * * *"
    asserts:
      - not: true
        isKind:
          of: Deployment

  - it: should not create a Service
    set:
      image.repository: mytask
      image.tag: latest
      cronjobs:
        default:
          enabled: true
          schedule: "0 * * * *"
    asserts:
      - not: true
        isKind:
          of: Service

  # ===========================================================================
  # Overrides
  # ===========================================================================

  - it: should not render timeZone by default
    set:
      image.repository: mytask
      image.tag: latest
      cronjobs:
        default:
          enabled: true
          schedule: "0 * * * *"
    asserts:
      - notExists:
          path: spec.timeZone
        documentSelector:
          path: kind
          value: CronJob

  - it: should render timeZone when set on the entry
    set:
      image.repository: mytask
      image.tag: latest
      cronjobs:
        default:
          enabled: true
          schedule: "0 * * * *"
          timeZone: Europe/Zurich
    asserts:
      - equal:
          path: spec.timeZone
          value: Europe/Zurich
        documentSelector:
          path: kind
          value: CronJob

  - it: should set per-entry command and args
    set:
      image.repository: mytask
      image.tag: latest
      cronjobs:
        default:
          enabled: true
          schedule: "0 * * * *"
          command:
            - /bin/sh
            - -c
          args:
            - echo hello
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].command
          value:
            - /bin/sh
            - -c
        documentSelector:
          path: kind
          value: CronJob
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].args
          value:
            - echo hello
        documentSelector:
          path: kind
          value: CronJob

  - it: should render two CronJobs when two entries are declared
    set:
      image.repository: mytask
      image.tag: latest
      cronjobs:
        backup:
          enabled: true
          schedule: "0 2 * * *"
        cleanup:
          enabled: true
          schedule: "0 3 * * *"
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-backup
        documentSelector:
          path: metadata.name
          value: RELEASE-NAME-backup
      - equal:
          path: metadata.name
          value: RELEASE-NAME-cleanup
        documentSelector:
          path: metadata.name
          value: RELEASE-NAME-cleanup

  - it: should skip disabled entries
    set:
      image.repository: mytask
      image.tag: latest
      cronjobs:
        active:
          enabled: true
          schedule: "0 2 * * *"
        inactive:
          enabled: false
          schedule: "0 3 * * *"
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-active
        documentSelector:
          path: kind
          value: CronJob

  # ===========================================================================
  # Root defaults injection (the main reason for the refactor)
  # ===========================================================================

  - it: should auto-inject root configMap.envFrom into plural-map cronjobs
    set:
      image.repository: mytask
      image.tag: latest
      configMap:
        enabled: true
        envFrom: true
        data:
          FOO: bar
      cronjobs:
        default:
          enabled: true
          schedule: "0 * * * *"
    asserts:
      - contains:
          path: spec.jobTemplate.spec.template.spec.containers[0].envFrom
          content:
            configMapRef:
              name: RELEASE-NAME-config
        documentSelector:
          path: kind
          value: CronJob

  - it: should auto-mount root volumes.secret entries on plural-map cronjobs
    set:
      image.repository: mytask
      image.tag: latest
      volumes:
        secret:
          mysecret:
            secretName: my-secret
            mountPath: /etc/secrets
      cronjobs:
        default:
          enabled: true
          schedule: "0 * * * *"
    asserts:
      - contains:
          path: spec.jobTemplate.spec.template.spec.volumes
          content:
            name: mysecret
            secret:
              secretName: my-secret
        documentSelector:
          path: kind
          value: CronJob
      - contains:
          path: spec.jobTemplate.spec.template.spec.containers[0].volumeMounts
          content:
            name: mysecret
            mountPath: /etc/secrets
        documentSelector:
          path: kind
          value: CronJob

  - it: should merge commonEnvVars into the container env
    set:
      image.repository: mytask
      image.tag: latest
      env:
        FOO: bar
      cronjobs:
        default:
          enabled: true
          schedule: "0 * * * *"
          commonEnvVars: true
    asserts:
      - contains:
          path: spec.jobTemplate.spec.template.spec.containers[0].env
          content:
            name: FOO
            value: bar
        documentSelector:
          path: kind
          value: CronJob

  # ==========================================================================
  # Datadog labels (admission controller injects env vars at admission time)
  # ==========================================================================
  - it: should set datadog unified service tagging labels on the cronjob pod
    set:
      image.repository: mytask
      image.tag: v1.2.3
      cronjobs:
        default:
          enabled: true
          schedule: "0 * * * *"
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.metadata.labels["admission.datadoghq.com/enabled"]
          value: "true"
        documentSelector:
          path: kind
          value: CronJob
      - equal:
          path: spec.jobTemplate.spec.template.metadata.labels["tags.datadoghq.com/service"]
          value: RELEASE-NAME
        documentSelector:
          path: kind
          value: CronJob
      - equal:
          path: spec.jobTemplate.spec.template.metadata.labels["tags.datadoghq.com/version"]
          value: v1.2.3
        documentSelector:
          path: kind
          value: CronJob

  - it: should not inject DD_AGENT_HOST into cronjob container env
    set:
      image.repository: mytask
      image.tag: v1.2.3
      cronjobs:
        default:
          enabled: true
          schedule: "0 * * * *"
          commonEnvVars: true
    asserts:
      - notContains:
          path: spec.jobTemplate.spec.template.spec.containers[0].env
          content:
            name: DD_AGENT_HOST
          any: true
        documentSelector:
          path: kind
          value: CronJob
