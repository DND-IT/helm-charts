# Default values for task chart
# A simplified chart for scheduled CronJob workloads

# Global values - passed down to subcharts
global:
  image:
    # Container registry prepended to all images
    registry: ""

# Common labels and annotations applied to all resources
commonLabels: {}
commonAnnotations: {}
workloadLabels: {}
workloadAnnotations: {}

# Metadata overrides
nameOverride: ""
fullnameOverride: ""
namespaceOverride: ""

# =============================================================================
# IMAGE CONFIGURATION
# =============================================================================

image:
  registry: ""
  repository: busybox
  tag: "1.37"
  pullPolicy: IfNotPresent

imagePullSecrets: []

# =============================================================================
# CRONJOB CONFIGURATION
# =============================================================================

# Cron schedule (required)
schedule: "0 * * * *"

# Concurrency policy: Allow, Forbid, or Replace
concurrencyPolicy: Forbid

# Number of successful jobs to keep
successfulJobsHistoryLimit: 3

# Number of failed jobs to keep
failedJobsHistoryLimit: 1

# Deadline in seconds for starting the job
startingDeadlineSeconds: ""

# Suspend the cronjob
suspend: false

# =============================================================================
# JOB CONFIGURATION
# =============================================================================

job:
  # Number of retries before marking the job as failed
  backoffLimit: 6

  # TTL for finished jobs (in seconds)
  ttlSecondsAfterFinished: 300

  # Number of completions required
  completions: 1

  # Number of pods to run in parallel
  parallelism: 1

  # Active deadline for the job (in seconds)
  activeDeadlineSeconds: ""

  # Completion mode: NonIndexed or Indexed
  completionMode: ""

# =============================================================================
# CONTAINER CONFIGURATION
# =============================================================================

command: []
args: []

# Resources
resources:
  # limits:
  #   memory: "256Mi"
  requests:
    cpu: "100m"
    memory: "128Mi"

# Lifecycle hooks
lifecycle: {}

# =============================================================================
# ENVIRONMENT CONFIGURATION
# =============================================================================

env: []
envFrom: []
extraEnvFrom: []
commonEnvVars: false

# =============================================================================
# POD CONFIGURATION
# =============================================================================

pod:
  labels:
    admission.datadoghq.com/enabled: "true"
  annotations: {}
  securityContext: {}
  # Pod-level resources (Kubernetes 1.32+ alpha, 1.33+ beta)
  # Requires PodLevelResources feature gate
  resources: {}
  hostNetwork: false
  hostPID: false
  hostIPC: false
  hostname: ""
  dnsPolicy: ""
  dnsConfig: {}
  priorityClassName: ""
  priority: ""
  runtimeClassName: ""
  schedulerName: ""
  terminationGracePeriodSeconds: 30
  activeDeadlineSeconds: ""
  restartPolicy: OnFailure
  hostAliases: []

# Security context for container (overrides defaults)
securityContext: {}

# =============================================================================
# SCHEDULING CONFIGURATION
# =============================================================================

scheduling:
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []

# =============================================================================
# INIT CONTAINERS
# =============================================================================

initContainers: []

# =============================================================================
# SERVICE ACCOUNT
# =============================================================================

serviceAccount:
  enabled: true
  name: ""
  annotations: {}
  labels: {}
  automountServiceAccountToken: true

# =============================================================================
# CONFIG AND SECRETS
# =============================================================================

configMap:
  enabled: false
  data: {}
  binaryData: {}
  annotations: {}
  labels: {}
  envFrom: false
  mountPath: ""
  subPath: ""

secret:
  enabled: false
  type: Opaque
  data: {}
  stringData: {}
  annotations: {}
  labels: {}
  envFrom: false
  mountPath: ""
  subPath: ""

extraConfigMaps: {}
extraSecrets: {}

# =============================================================================
# VOLUMES
# =============================================================================

volumes:
  persistent: {}
  emptyDir: {}
  hostPath: {}
  extra: []
  extraMounts: []

# =============================================================================
# SECURITY CONFIGURATION
# =============================================================================

security:
  defaultPodSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
    seccompProfile:
      type: RuntimeDefault

  defaultContainerSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault

  podSecurityStandards:
    enabled: false
    enforce: ""
    audit: ""
    warn: ""

# =============================================================================
# SERVICE (disabled - tasks don't need services)
# =============================================================================

service:
  enabled: false

# RBAC - Role-Based Access Control
rbac:
  enabled: false
  type: Role
  rules: []
  aggregationRule: {}
  subjects: []
  roleRef: ""
  labels: {}
  annotations: {}
  extraRoles: {}

# Network Policy
networkPolicy:
  enabled: false
  policyTypes: []
  ingress: []
  egress: []

# External Secrets
externalSecrets: {}

# Gateway API (not typically used with CronJobs but available)
gateway:
  httpRoute:
    enabled: false
    parentRefs: []
    hostnames: []
    rules: []
    labels: {}
    annotations: {}
    extraRoutes: {}
  tcpRoute:
    enabled: false
    parentRefs: []
    rules: []
    labels: {}
    annotations: {}
    extraRoutes: {}
  referenceGrant:
    enabled: false
    from: []
    to: []
    labels: {}
    annotations: {}
    extraGrants: {}

# Extra arbitrary Kubernetes objects
extraObjects: []
