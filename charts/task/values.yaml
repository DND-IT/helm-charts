# Task Chart - Opinionated defaults for scheduled CronJob workloads
# Only overrides from common library defaults are defined here
# All other values are inherited from the common library chart

# =============================================================================
# REQUIRED
# =============================================================================

image:
  repository: ""  # REQUIRED: your image repository
  tag: ""         # REQUIRED: your image tag

# =============================================================================
# OPINIONATED DEFAULTS
# =============================================================================

# No deployment - tasks use CronJob workload
workload:
  type: none

# Declare one or more scheduled tasks under cronjobs.
# Each entry inherits root configMap/secret/volumes/commonEnvVars; per-entry
# fields (command, args, env, image, etc.) override root values.
cronjobs: {}
  # default:
  #   enabled: true
  #   schedule: "0 * * * *"
  #   concurrencyPolicy: Forbid
  #   successfulJobsHistoryLimit: 3
  #   failedJobsHistoryLimit: 1
  #   suspend: false
  #   backoffLimit: 6
  #   ttlSecondsAfterFinished: 300
  #   command: ["echo", "hello"]

# Pod-level resource defaults for tasks (Kubernetes 1.32+)
resources:
  requests:
    cpu: "100m"
    memory: "128Mi"

# No topology spread for CronJobs
scheduling:
  topologySpreadConstraints: []

# Service disabled for tasks
service:
  enabled: false
