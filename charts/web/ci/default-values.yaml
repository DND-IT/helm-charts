# CI test values for web chart
# Basic configuration to test chart rendering

image:
  repository: nginx
  tag: "1.25"

replicas: 2

ports:
  - name: http
    containerPort: 8080

service:
  enabled: true
  type: ClusterIP

ingress:
  enabled: true
  ingressClassName: alb
  hosts:
    - host: test.example.com
      paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              port:
                number: 80

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5

podDisruptionBudget:
  enabled: true
  minAvailable: 1
