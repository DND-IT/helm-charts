# Web Chart - Opinionated defaults for external-facing web applications
# Only overrides from common library defaults are defined here
# All other values are inherited from the common library chart

# =============================================================================
# REQUIRED
# =============================================================================

image:
  repository: ""  # REQUIRED: your image repository
  tag: ""         # REQUIRED: your image tag

# =============================================================================
# OPINIONATED DEFAULTS
# =============================================================================

# Default port for web applications
ports:
  - name: http
    containerPort: 8080
    protocol: TCP

# Pod-level resource defaults (Kubernetes 1.32+)
resources:
  requests:
    cpu: 100m
    memory: 128Mi

# Health probes (following Kubernetes /livez /readyz convention)
livenessProbe:
  httpGet:
    path: /livez
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 2
  timeoutSeconds: 3
  failureThreshold: 30

# Scheduling
scheduling:
  nodeSelector:
    kubernetes.io/arch: amd64
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway

# Service enabled by default
service:
  enabled: true
  type: ClusterIP

# =============================================================================
# GATEWAY API (replaces Ingress)
# Uses AWS Load Balancer Controller v3 with Gateway API
# =============================================================================

gateway:
  # HTTPRoute ENABLED by default for web apps (key difference from api chart)
  httpRoute:
    enabled: true
    # parentRefs REQUIRED: reference to your Gateway resource
    # Example:
    # parentRefs:
    #   - name: my-gateway
    #     namespace: gateway-system
    parentRefs: []
    # hostnames REQUIRED: your application hostname(s)
    # Example:
    # hostnames:
    #   - myapp.example.com
    hostnames: []
    rules: []

  # AWS ALB target group configuration
  targetGroupConfiguration:
    enabled: true
    defaultConfiguration:
      targetType: ip
      protocolVersion: HTTP1
      healthCheckConfig:
        healthCheckPath: /readyz
        healthCheckPort: "8080"
        healthCheckProtocol: HTTP
        healthCheckInterval: 15
        healthyThresholdCount: 2
        unhealthyThresholdCount: 3

  # AWS ALB load balancer configuration
  loadBalancerConfiguration:
    enabled: true
    scheme: internet-facing
    ipAddressType: ipv4

# ConfigMap defaults to envFrom injection when enabled
configMap:
  envFrom: true

# HPA defaults
hpa:
  minReplicas: 2
