# Web Chart - Opinionated defaults for external-facing web applications
# Only overrides from common library defaults are defined here
# All other values are inherited from the common library chart

# =============================================================================
# REQUIRED
# =============================================================================

image:
  repository: ""  # REQUIRED: your image repository
  tag: ""         # REQUIRED: your image tag

# =============================================================================
# OPINIONATED DEFAULTS
# =============================================================================

# Datadog unified service tagging applied to all rendered resources.
# admission.datadoghq.com/enabled triggers the Datadog admission controller to
# inject DD_AGENT_HOST and the DD_SERVICE/DD_ENV/DD_VERSION/DD_ENTITY_ID env vars
# at admission time, so the agent transport (hostPort, Service, or UDS) follows
# whatever the cluster's admission controller knows is right.
# Override individual keys (e.g. tags.datadoghq.com/env) via your own commonLabels.
commonLabels:
  admission.datadoghq.com/enabled: "true"
  tags.datadoghq.com/service: '{{ include "common.fullname" . }}'
  tags.datadoghq.com/version: '{{ .Values.image.tag | default "latest" }}'

# Default container port for web applications
# Automatically flows to: container port, service targetPort, healthCheckPort
# Service port stays 80 (static) — only the target port is dynamic
port: 8080

# Pod-level resource defaults (Kubernetes 1.32+)
resources:
  requests:
    cpu: 100m
    memory: 128Mi

# Health probes (following Kubernetes /livez /readyz convention)
livenessProbe:
  httpGet:
    path: /livez
    port: http  # @schema type:[string, integer]
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /readyz
    port: http  # @schema type:[string, integer]
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /readyz
    port: http  # @schema type:[string, integer]
  initialDelaySeconds: 10
  periodSeconds: 2
  timeoutSeconds: 3
  failureThreshold: 30

# Scheduling
scheduling:
  nodeSelector:
    kubernetes.io/arch: amd64
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway

# Service enabled by default
service:
  enabled: true
  type: ClusterIP
  port: 8080

# =============================================================================
# GATEWAY API (replaces Ingress)
# Uses AWS Load Balancer Controller v3 with Gateway API
# =============================================================================

gateway:
  # HTTPRoute ENABLED by default for web apps (key difference from api chart)
  httpRoute:
    enabled: true
    # parentRefs REQUIRED: reference to your Gateway resource
    # Example:
    # parentRefs:
    #   - group: gateway.networking.k8s.io
    #     kind: Gateway
    #     name: my-gateway
    #     namespace: gateway-system
    parentRefs: []
    # hostnames REQUIRED: your application hostname(s)
    # Example:
    # hostnames:
    #   - myapp.example.com
    hostnames: []
    rules: []

  # AWS ALB target group configuration
  targetGroupConfiguration:
    enabled: true
    defaultConfiguration:
      targetType: ip
      protocolVersion: HTTP1
      healthCheckConfig:
        healthCheckPath: /readyz
        # healthCheckPort is derived from `port` automatically
        healthCheckProtocol: HTTP
        healthCheckInterval: 15
        healthyThresholdCount: 2
        unhealthyThresholdCount: 3

  # AWS ALB load balancer configuration
  loadBalancerConfiguration:
    enabled: false

# ConfigMap defaults to envFrom injection when enabled
configMap:
  envFrom: true

# HPA enabled by default for web workloads. CPU-based scaling at 80% utilization
# works out of the box with the default resources.requests.cpu (100m). Override
# `hpa.metrics` to add memory or custom metrics, or set `hpa.enabled: false` to
# opt out.
hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80

# PodDisruptionBudget enabled by default — with minReplicas: 2 and minAvailable: 1
# this keeps one pod up through voluntary disruptions (node drains, rollouts).
podDisruptionBudget:
  enabled: true
  minAvailable: 1
