# CI test values for worker chart
# Basic configuration to test chart rendering

image:
  repository: busybox
  tag: "1.36"

replicas: 2

command:
  - /bin/sh
  - -c
args:
  - "while true; do echo 'Working...'; sleep 60; done"

resources:
  limits:
    memory: "128Mi"
  requests:
    cpu: "50m"
    memory: "64Mi"

# No service for workers
service:
  enabled: false

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 5

podDisruptionBudget:
  enabled: true
  minAvailable: 1
