# Worker Chart - Opinionated defaults for background processing workloads
# Only overrides from common library defaults are defined here
# All other values are inherited from the common library chart

# =============================================================================
# REQUIRED
# =============================================================================

image:
  repository: ""  # REQUIRED: your image repository
  tag: ""         # REQUIRED: your image tag

# =============================================================================
# OPINIONATED DEFAULTS
# =============================================================================

# Datadog unified service tagging applied to all rendered resources.
# admission.datadoghq.com/enabled triggers the Datadog admission controller to
# inject DD_AGENT_HOST and the DD_SERVICE/DD_ENV/DD_VERSION/DD_ENTITY_ID env vars
# at admission time, so the agent transport (hostPort, Service, or UDS) follows
# whatever the cluster's admission controller knows is right.
# Override individual keys (e.g. tags.datadoghq.com/env) via your own commonLabels.
commonLabels:
  admission.datadoghq.com/enabled: "true"
  tags.datadoghq.com/service: '{{ include "common.fullname" . }}'
  tags.datadoghq.com/version: '{{ .Values.image.tag | default "latest" }}'

# Pod-level resource defaults for workers (Kubernetes 1.32+)
resources:
  limits:
    memory: "256Mi"
  requests:
    cpu: "100m"
    memory: "128Mi"

# Scheduling
scheduling:
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway

# Service disabled by default for workers
service:
  enabled: false
